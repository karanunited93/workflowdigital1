<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WireFlow — Wirality Media</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
/* ── CLOUDINARY CONFIG ── */
const CLOUDINARY_CLOUD = 'dnhktlm2m';
const CLOUDINARY_PRESET = 'wireflow_uploads';
const CLOUDINARY_UPLOAD_URL = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/auto/upload`;

async function uploadToCloudinary(file, onProgress){
  return new Promise((resolve, reject) => {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', CLOUDINARY_PRESET);
    fd.append('folder', 'wireflow');
    const xhr = new XMLHttpRequest();
    xhr.open('POST', CLOUDINARY_UPLOAD_URL);
    xhr.upload.onprogress = e => { if(e.lengthComputable && onProgress) onProgress(Math.round(e.loaded/e.total*100)); };
    xhr.onload = () => {
      if(xhr.status === 200){
        const r = JSON.parse(xhr.responseText);
        resolve({ url: r.secure_url, name: file.name, size: file.size, type: file.type, public_id: r.public_id });
      } else { reject(new Error('Upload failed: ' + xhr.statusText)); }
    };
    xhr.onerror = () => reject(new Error('Network error during upload'));
    xhr.send(fd);
  });
}
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F5F4F0;--surf:#FFF;--surf2:#EFEDE7;--surf3:#E6E3DB;
  --bdr:rgba(0,0,0,0.08);--bdr2:rgba(0,0,0,0.14);--bdr3:rgba(0,0,0,0.22);
  --tx:#18170F;--tx2:#6A6860;--tx3:#A8A69E;
  --grn:#1D9E75;--grn-bg:#E1F5EE;--grn-tx:#085041;
  --amb:#D4840A;--amb-bg:#FDF3E0;--amb-tx:#7A4500;
  --blu:#2B7FD4;--blu-bg:#E8F2FC;--blu-tx:#0C3D6E;
  --red:#C94040;--red-bg:#FDEAEA;--red-tx:#6E1515;
  --pur:#6B4FBB;--pur-bg:#F0ECFC;--pur-tx:#3A2770;
  --gry-bg:#EDECE8;--gry-tx:#4A4945;
  --r:8px;--rsm:5px;--rlg:12px;--sb:220px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;font-size:14px;}
.app{display:flex;height:100vh;}

/* SIDEBAR */
.sidebar{width:var(--sb);min-width:var(--sb);background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;}
.logo{padding:16px 14px 12px;border-bottom:1px solid var(--bdr);}
.logo-row{display:flex;align-items:center;gap:8px;}
.logo-box{width:26px;height:26px;background:var(--tx);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-box svg{width:13px;height:13px;}
.logo-name{font-size:14px;font-weight:600;letter-spacing:-.3px;}
.logo-org{font-size:10px;color:var(--tx3);margin-top:1px;padding-left:34px;}
.nav{flex:1;padding:8px;overflow-y:auto;}
.nav-sec{font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:.7px;text-transform:uppercase;padding:10px 8px 4px;}
.ni{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--rsm);cursor:pointer;font-size:13px;color:var(--tx2);transition:all .12s;user-select:none;}
.ni:hover{background:var(--surf2);color:var(--tx);}
.ni.active{background:var(--tx);color:#fff;}
.ni.active .pip{opacity:.4;}
.pip{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--bdr2);}
.pip.g{background:var(--grn)}.pip.a{background:var(--amb)}.pip.b{background:var(--blu)}.pip.r{background:var(--red)}.pip.p{background:var(--pur)}
.ni-badge{margin-left:auto;font-size:10px;background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-weight:700;}
.user-bar{padding:10px 12px;border-top:1px solid var(--bdr);display:flex;align-items:center;gap:8px;cursor:pointer;}
.user-bar:hover{background:var(--surf2);}
.uname{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.urole{font-size:10px;color:var(--tx3);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{height:50px;background:var(--surf);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0;}
.page-title{font-size:15px;font-weight:600;flex:1;letter-spacing:-.3px;}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;font-size:12px;font-family:inherit;border:1px solid var(--bdr2);border-radius:var(--rsm);background:var(--surf);color:var(--tx);cursor:pointer;transition:all .12s;white-space:nowrap;font-weight:500;}
.btn:hover{background:var(--surf2);}
.btn:active{transform:scale(.98);}
.btn-dark{background:var(--tx);color:#fff;border-color:var(--tx);}
.btn-dark:hover{background:#2a2820;}
.btn-grn{background:var(--grn);color:#fff;border-color:var(--grn);}
.btn-grn:hover{background:#0F6E56;}
.btn-red{background:var(--red);color:#fff;border-color:var(--red);}
.btn-xs{padding:4px 10px;font-size:11px;}
.btn-sm{padding:5px 11px;font-size:12px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.b-backlog{background:var(--gry-bg);color:var(--gry-tx);}
.b-planning{background:var(--pur-bg);color:var(--pur-tx);}
.b-inprogress{background:var(--amb-bg);color:var(--amb-tx);}
.b-review{background:var(--blu-bg);color:var(--blu-tx);}
.b-approved{background:var(--grn-bg);color:var(--grn-tx);}
.b-rejected{background:var(--red-bg);color:var(--red-tx);}
.b-high{background:var(--red-bg);color:var(--red-tx);}
.b-normal{background:var(--gry-bg);color:var(--gry-tx);}
.b-won{background:var(--grn-bg);color:var(--grn-tx);}
.b-lost{background:var(--gry-bg);color:var(--gry-tx);}
.b-pitched{background:var(--blu-bg);color:var(--blu-tx);}
.b-followup{background:var(--amb-bg);color:var(--amb-tx);}
.b-prospecting{background:var(--gry-bg);color:var(--gry-tx);}
.b-announce{background:var(--blu-bg);color:var(--blu-tx);}
.b-done{background:var(--grn-bg);color:var(--grn-tx);}
.b-overdue{background:var(--red-bg);color:var(--red-tx);}

/* AVATAR */
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;font-family:'DM Mono',monospace;}
.av-sm{width:22px;height:22px;font-size:9px;}
.av-lg{width:36px;height:36px;font-size:13px;}
.av-xl{width:44px;height:44px;font-size:15px;}
.av-g{background:#9FE1CB;color:#085041;}.av-b{background:#B5D4F4;color:#0C447C;}.av-a{background:#FAC775;color:#633806;}.av-p{background:#CECBF6;color:#3C3489;}.av-r{background:#F5C4B3;color:#712B13;}.av-k{background:#C0DD97;color:#27500A;}.av-t{background:#F4C0D1;color:#72243E;}.av-o{background:#FDE8C8;color:#8B4A00;}.av-c{background:#C8E8FD;color:#0A4A6E;}

/* PANELS */
.panel{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rlg);overflow:hidden;}
.ph{display:flex;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid var(--bdr);}
.ph-title{font-size:13px;font-weight:600;flex:1;}

/* SCROLLABLE AREAS */
.scroll{overflow-y:auto;flex:1;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px;}
::-webkit-scrollbar-track{background:transparent;}

/* ─── DASHBOARD ─── */
.dash-wrap{overflow-y:auto;padding:18px 20px;flex:1;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.stat-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:14px 16px;}
.stat-lbl{font-size:10px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.stat-val{font-size:26px;font-weight:300;letter-spacing:-1px;line-height:1;margin-bottom:2px;}
.stat-sub{font-size:11px;color:var(--tx3);}
.dash-cols{display:grid;grid-template-columns:1fr 1fr 280px;gap:12px;}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3);margin-bottom:8px;}

/* ACTION ITEM ROW */
.ai-row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .1s;}
.ai-row:last-child{border-bottom:none;}
.ai-row:hover{background:var(--surf2);}
.ai-name{flex:1;font-size:13px;line-height:1.35;min-width:0;}
.ai-meta{font-size:11px;color:var(--tx3);margin-top:1px;}
.overdue-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;}

/* ─── ACCOUNTS ─── */
.acc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:20px;overflow-y:auto;}
.acc-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:all .15s;}
.acc-card:hover{border-color:var(--bdr2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.06);}
.acc-emoji{font-size:22px;margin-bottom:6px;}
.acc-name{font-size:14px;font-weight:600;margin-bottom:2px;}
.acc-type{font-size:11px;color:var(--tx3);margin-bottom:10px;}
.acc-lead{font-size:11px;color:var(--tx2);display:flex;align-items:center;gap:4px;margin-bottom:10px;}
.acc-stats{display:flex;gap:14px;border-top:1px solid var(--bdr);padding-top:10px;}
.acc-stat .v{font-size:18px;font-weight:300;letter-spacing:-.4px;}
.acc-stat .l{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px;}

/* ─── KANBAN ─── */
.kanban-wrap{display:flex;gap:11px;padding:14px 18px;overflow-x:auto;overflow-y:hidden;flex:1;align-items:flex-start;}
.k-col{width:230px;min-width:230px;background:var(--surf2);border-radius:var(--r);display:flex;flex-direction:column;max-height:calc(100vh - 140px);}
.k-col-head{padding:9px 11px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.k-col-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx2);flex:1;}
.k-count{font-size:11px;background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:1px 7px;color:var(--tx3);}
.k-cards{flex:1;overflow-y:auto;padding:7px;display:flex;flex-direction:column;gap:6px;}
.k-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:9px 11px;cursor:pointer;transition:all .12s;}
.k-card:hover{border-color:var(--bdr2);transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.07);}
.k-card-name{font-size:13px;font-weight:500;line-height:1.35;margin-bottom:7px;}
.k-card-foot{display:flex;align-items:center;gap:5px;}
.k-due{font-size:10px;color:var(--tx3);flex:1;}
.k-due.late{color:var(--red);font-weight:500;}
.k-add{padding:6px 7px;flex-shrink:0;}
.k-add-btn{width:100%;padding:6px;font-size:12px;color:var(--tx3);background:transparent;border:1px dashed var(--bdr2);border-radius:var(--rsm);cursor:pointer;font-family:inherit;transition:all .12s;}
.k-add-btn:hover{background:var(--surf);color:var(--tx);border-style:solid;}

/* ─── TABS ─── */
.tabs{display:flex;gap:2px;padding:0 18px;border-bottom:1px solid var(--bdr);background:var(--surf);flex-shrink:0;}
.tab{padding:10px 14px;font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;}
.tab:hover{color:var(--tx);}
.tab.active{color:var(--tx);border-bottom-color:var(--tx);}

/* ─── PITCH DOCS ─── */
.docs-wrap{overflow-y:auto;padding:18px;flex:1;}
.doc-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--bdr);transition:background .1s;}
.doc-row:last-child{border-bottom:none;}
.doc-row:hover{background:var(--surf2);}
.doc-icon{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.doc-name{flex:1;font-size:13px;font-weight:500;}
.doc-meta{font-size:11px;color:var(--tx3);}
.doc-type-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;}
.dt-brief{background:#E8F4FF;color:#1A4D7C;}
.dt-deck{background:#F0ECFC;color:#3A2770;}
.dt-report{background:#E1F5EE;color:#085041;}
.dt-proposal{background:#FDF3E0;color:#7A4500;}
.dt-other{background:#EDECE8;color:#4A4945;}

/* ─── OPS ─── */
.ops-wrap{overflow-y:auto;padding:18px;flex:1;}
.ops-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .1s;}
.ops-row:last-child{border-bottom:none;}
.ops-row:hover{background:var(--surf2);}
.ops-name{flex:1;font-size:13px;font-weight:500;}
.ops-dates{font-size:11px;color:var(--tx3);}
.progress-wrap{width:70px;}
.progress-bar{height:4px;background:var(--surf3);border-radius:2px;overflow:hidden;margin-top:3px;}
.progress-fill{height:100%;background:var(--grn);border-radius:2px;transition:width .3s;}

/* ─── FEED ─── */
.feed-wrap{overflow-y:auto;padding:18px;flex:1;display:flex;flex-direction:column;gap:0;}
.feed-day{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.5px;text-transform:uppercase;padding:12px 0 6px;}
.feed-item{display:flex;gap:10px;padding:10px 14px;border-radius:var(--r);transition:background .1s;}
.feed-item:hover{background:var(--surf2);}
.feed-body{flex:1;min-width:0;}
.feed-top{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.feed-who{font-size:12px;font-weight:600;}
.feed-time{font-size:11px;color:var(--tx3);margin-left:auto;}
.feed-text{font-size:13px;line-height:1.5;color:var(--tx);}
.feed-tag{font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;}
.ft-task{background:var(--blu-bg);color:var(--blu-tx);}
.ft-pitch{background:var(--amb-bg);color:var(--amb-tx);}
.ft-announce{background:var(--pur-bg);color:var(--pur-tx);}
.ft-doc{background:var(--grn-bg);color:var(--grn-tx);}

/* ─── CHAT ─── */
.chat-layout{display:flex;flex:1;overflow:hidden;}
.chat-sb{width:210px;min-width:210px;background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;}
.chat-sb-head{padding:11px 12px;border-bottom:1px solid var(--bdr);font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.7px;text-transform:uppercase;}
.chat-dm-list{flex:1;overflow-y:auto;padding:6px;}
.cdm{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--rsm);cursor:pointer;transition:background .1s;}
.cdm:hover{background:var(--surf2);}
.cdm.active{background:var(--surf2);}
.cdm-info{flex:1;min-width:0;}
.cdm-name{font-size:13px;font-weight:500;}
.cdm-preview{font-size:11px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cdm-badge{background:var(--red);color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center;}
.online{width:7px;height:7px;border-radius:50%;background:#22C55E;border:1.5px solid var(--surf);position:absolute;bottom:0;right:0;}
.av-wrap{position:relative;}
.chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-topbar{padding:11px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;background:var(--surf);flex-shrink:0;}
.chat-msgs{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px;}
.msg{display:flex;gap:8px;align-items:flex-start;max-width:100%;}
.msg.me{flex-direction:row-reverse;}
.msg-body{max-width:68%;}
.msg.me .msg-body{align-items:flex-end;display:flex;flex-direction:column;}
.msg-meta{font-size:10px;color:var(--tx3);margin-bottom:3px;}
.msg-bubble{padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.5;word-break:break-word;}
.msg-bubble.their{background:var(--surf2);border-bottom-left-radius:3px;}
.msg-bubble.mine{background:var(--tx);color:#fff;border-bottom-right-radius:3px;}
.chat-input-wrap{padding:10px 14px;border-top:1px solid var(--bdr);background:var(--surf);flex-shrink:0;}
.chat-input-row{display:flex;gap:8px;align-items:flex-end;}
.chat-input{flex:1;padding:8px 12px;font-size:13px;border:1px solid var(--bdr2);border-radius:18px;background:var(--surf2);color:var(--tx);font-family:inherit;resize:none;outline:none;max-height:90px;line-height:1.4;}
.chat-input:focus{border-color:var(--blu);background:var(--surf);}

/* ─── PEOPLE ─── */
.people-wrap{overflow-y:auto;padding:18px;flex:1;}
.people-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.p-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:16px 12px;text-align:center;position:relative;}
.p-card .edit-btn{position:absolute;top:8px;right:8px;opacity:0;transition:opacity .15s;}
.p-card:hover .edit-btn{opacity:1;}
.p-name{font-size:13px;font-weight:600;margin:8px 0 2px;}
.p-role{font-size:11px;color:var(--tx3);margin-bottom:8px;}
.p-tasks{font-size:11px;color:var(--tx2);}
.p-tasks strong{color:var(--tx);font-weight:600;}
.add-person-card{background:transparent;border:1px dashed var(--bdr2);border-radius:var(--r);padding:16px 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;min-height:140px;}
.add-person-card:hover{background:var(--surf);border-style:solid;}

/* ─── DRAWER ─── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:200;display:none;backdrop-filter:blur(2px);}
.overlay.open{display:flex;align-items:flex-end;justify-content:flex-end;}
.drawer{width:420px;height:100vh;background:var(--surf);border-left:1px solid var(--bdr);display:flex;flex-direction:column;animation:slin .18s ease;}
@keyframes slin{from{transform:translateX(24px);opacity:0;}to{transform:translateX(0);opacity:1;}}
.dh{padding:13px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.dh-title{font-size:14px;font-weight:600;flex:1;}
.db{flex:1;overflow-y:auto;padding:16px;}

/* ─── LOGIN ─── */
.lov{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.lov.open{display:flex;}
.lov-box{background:var(--surf);border-radius:var(--rlg);width:290px;overflow:hidden;border:1px solid var(--bdr);}
.lov-head{padding:12px 14px;border-bottom:1px solid var(--bdr);font-size:13px;font-weight:600;}
.lov-list{padding:6px;max-height:380px;overflow-y:auto;}
.lov-row{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--rsm);cursor:pointer;transition:background .1s;}
.lov-row:hover{background:var(--surf2);}
.lov-row.active{background:var(--grn-bg);}

/* ─── FORMS ─── */
.fg{margin-bottom:13px;}
.fl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px;}
.fi{width:100%;padding:8px 10px;font-size:13px;border:1px solid var(--bdr2);border-radius:var(--rsm);background:var(--surf);color:var(--tx);font-family:inherit;transition:border-color .12s;}
.fi:focus{outline:none;border-color:var(--blu);}
select.fi{cursor:pointer;}

/* ══════ NAV ══════ */
function goNav(el,view){
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  cv=view;
  const titles={dashboard:'Dashboard',pitches:'Pitches',ops:'Internal ops',feed:'Activity log',chat:'Chat',people:'People'};
  if(view.startsWith('acct-')){
    const id=view.replace('acct-','');
    const a=gA(id);
    document.getElementById('ptitle').textContent=a.emoji+' '+a.name;
  } else {
    document.getElementById('ptitle').textContent=titles[view]||view;
  }
  document.getElementById('tbar-actions').innerHTML='';
  renderView(view);
}
function renderView(v){
  const c=document.getElementById('content');
  const ta=document.getElementById('tbar-actions');
  ta.innerHTML='';
  // Reset content styles for non-account views
  if(!v.startsWith('acct-')) c.style.cssText='flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;';
  if(v==='dashboard') renderDash(c);
  else if(v.startsWith('acct-')) renderAcct(v.replace('acct-',''),c,ta);
  else if(v==='pitches') renderPitches(c,ta);
  else if(v==='ops') renderOps(c,ta);
  else if(v==='feed') renderFeed(c);
  else if(v==='chat') renderChat(c);
  else if(v==='people') renderPeople(c,ta);
  else if(v==='leaderboard') renderLeaderboard(c,ta);
  updUnread();
}

}
function buildChatMain(uid){
  const m=gT(uid);
  const msgs=chatMsgs[uid]||[];
  return`<div class="chat-topbar">
    <div class="av-wrap">${av(m,'av-lg')}<div class="online"></div></div>
    <div><div style="font-size:14px;font-weight:600;">${m.name}</div><div style="font-size:11px;color:var(--tx3);">${m.role} · Online</div></div>
  </div>
  <div class="chat-msgs" id="chat-msgs">
    ${msgs.length?msgs.map(msg=>{const isMe=msg.from===cu.id;
      return`<div class="msg ${isMe?'me':''}">
        ${!isMe?av(gT(msg.from),'av-sm'):''}
        <div class="msg-body">
          <div class="msg-meta">${!isMe?gT(msg.from).name+' · ':''} ${msg.ts}</div>
          <div class="msg-bubble ${isMe?'mine':'their'}">${msg.txt}</div>
        </div>
      </div>`;}).join(''):`<div class="empty" style="margin:auto;">Start a conversation with ${m.name}</div>`}
  </div>
  <div class="chat-input-wrap">
    <div class="chat-input-row">
      <textarea class="chat-input" id="ci-${uid}" placeholder="Message ${m.name}…" rows="1" onkeydown="chatKey(event,'${uid}')"></textarea>
      <button class="btn btn-dark btn-xs" onclick="sendMsg('${uid}')">Send</button>
    </div>
    <div style="font-size:10px;color:var(--tx3);margin-top:6px;" id="chat-status-bar">Messages sync via Firebase · Enter to send · Shift+Enter for new line</div>
  </div>`;
}
function openChat(uid){
  chatWith=uid;unread[uid]=0;updUnread();
  document.querySelectorAll('.cdm').forEach(d=>d.classList.remove('active'));
  document.getElementById('dm-'+uid)?.classList.add('active');
  document.getElementById('chat-main').innerHTML=buildChatMain(uid);
  scrollChat();
  // Update unread badge in DM list
  const badge=document.querySelector(`#dm-${uid} .cdm-badge`);
  if(badge)badge.remove();
}
function sendMsg(uid){
  const inp=document.getElementById('ci-'+uid);if(!inp)return;
  const txt=inp.value.trim();if(!txt)return;
  const ts=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  const msg={from:cu.id,txt,ts};
  if(!chatMsgs[uid])chatMsgs[uid]=[];
  chatMsgs[uid].push(msg);
  inp.value='';
  // Always save to localStorage
  try{localStorage.setItem('wf_chat_'+uid,JSON.stringify(chatMsgs[uid]));}catch(e){}
  // Write to Firebase — key is sorted pair so both users see same thread
  if(fbOk&&db){
    const key=[cu.id,uid].sort().join('__');
    db.ref('wireflow_chat/'+key).push({...msg,users:[cu.id,uid]}).catch(e=>console.warn('FB write failed',e));
  }
  document.getElementById('chat-main').innerHTML=buildChatMain(uid);
  scrollChat();
}
function chatKey(e,uid){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg(uid);}}
function scrollChat(){const el=document.getElementById('chat-msgs');if(el)el.scrollTop=el.scrollHeight;}
// Load chat from localStorage first, then sync from Firebase
function loadChatFromStorage(){
  TEAM.forEach(m=>{
    if(m.id!==cu.id){
      try{
        const s=localStorage.getItem('wf_chat_'+m.id);
        if(s){const saved=JSON.parse(s);if(saved.length>(chatMsgs[m.id]||[]).length)chatMsgs[m.id]=saved;}
      }catch(e){}
    }
  });
}
function syncChatFromFirebase(){
  if(!fbOk||!db)return;
  TEAM.forEach(m=>{
    if(m.id===cu.id)return;
    const key=[cu.id,m.id].sort().join('__');
    db.ref('wireflow_chat/'+key).orderByKey().limitToLast(100).once('value').then(snap=>{
      if(!snap.exists())return;
      const msgs=[];
      snap.forEach(child=>{const v=child.val();if(v&&v.txt)msgs.push({from:v.from,txt:v.txt,ts:v.ts||'—'});});
      if(msgs.length>(chatMsgs[m.id]||[]).length){
        chatMsgs[m.id]=msgs;
        try{localStorage.setItem('wf_chat_'+m.id,JSON.stringify(msgs));}catch(e){}
        // Refresh chat UI if open
        if(cv==='chat'&&chatWith===m.id){
          document.getElementById('chat-main').innerHTML=buildChatMain(m.id);
          scrollChat();
        }
      }
    }).catch(()=>{});
    // Also listen for new messages in real-time
    db.ref('wireflow_chat/'+key).limitToLast(1).on('child_added', snap=>{
      const v=snap.val();
      if(!v||v.from===cu.id)return; // skip own messages
      if(!chatMsgs[m.id])chatMsgs[m.id]=[];
      // Avoid duplicates
      const last=chatMsgs[m.id][chatMsgs[m.id].length-1];
      if(last&&last.txt===v.txt&&last.from===v.from)return;
      chatMsgs[m.id].push({from:v.from,txt:v.txt,ts:v.ts||'now'});
      unread[m.id]=(unread[m.id]||0)+1;
      updUnread();
      try{localStorage.setItem('wf_chat_'+m.id,JSON.stringify(chatMsgs[m.id]));}catch(e){}
      if(cv==='chat'&&chatWith===m.id){
        unread[m.id]=0;updUnread();
        document.getElementById('chat-main').innerHTML=buildChatMain(m.id);
        scrollChat();
      }
    });
  });
}

async function processFileUpload(file,id){
  if(file.size>10*1024*1024){alert('File too large. Max 10MB.');return;}
  const prog=document.getElementById('upload-progress');
  const label=document.getElementById('progress-label');
  const bar=document.getElementById('progress-bar-fill');
  if(prog){prog.style.display='block';}
  try{
    const result=await uploadToCloudinary(file,(pct)=>{
      if(bar)bar.style.width=pct+'%';
      if(label)label.textContent='Uploading… '+pct+'%';
    });
    const t=ensureTaskFields(tasks.find(t=>t.id===id));
    const ext=file.name.split('.').pop().toLowerCase();
    const iconMap={pdf:'📄',doc:'📝',docx:'📝',ppt:'📊',pptx:'📊',xls:'📈',xlsx:'📈',png:'🖼️',jpg:'🖼️',jpeg:'🖼️',gif:'🖼️',mp4:'🎬',mov:'🎬',fig:'🎨'};
    const icon=iconMap[ext]||'📎';
    const sizeStr=file.size>1024*1024?(file.size/1024/1024).toFixed(1)+'MB':(file.size/1024).toFixed(0)+'KB';
    t.attachments.push({name:file.name,url:result.url,type:ext.toUpperCase(),icon,size:sizeStr,added:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'})});
    t.taskLog.push({u:cu.id,txt:`uploaded "${file.name}"`,ts:tsNow()});
    logAct(`Uploaded "${file.name}" to task "${t.name.substring(0,30)}"`, 'doc');
    fbSaveTasks();
    closeUploadModal();
    openTaskDr(id);
  }catch(err){
    if(label)label.textContent='Upload failed: '+err.message;
    if(bar)bar.style.width='0%';
    console.error(err);
  }
}
function addLinkAttach(id){
  const url=document.getElementById('link-url')?.value?.trim();
  const name=document.getElementById('link-name')?.value?.trim();
  if(!url){alert('Please paste a URL.');return;}
  const t=ensureTaskFields(tasks.find(t=>t.id===id));
  const typeMap={'figma.com':['Figma','🎨'],'docs.google':['Google Doc','📝'],'drive.google':['Google Drive','📁'],'notion.so':['Notion','📓'],'sheets.google':['Google Sheet','📈'],'slides.google':['Google Slides','📊']};
  let type='Link',icon='🔗';
  for(const[k,[v,ic]] of Object.entries(typeMap)){if(url.includes(k)){type=v;icon=ic;break;}}
  const finalName=name||(type!=='Link'?type+' link':'Attachment');
  t.attachments.push({name:finalName,url,type,icon,added:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'})});
  t.taskLog.push({u:cu.id,txt:`linked "${finalName}"`,ts:tsNow()});
  logAct(`Linked "${finalName}" to task "${t.name.substring(0,30)}"`, 'doc');
  fbSaveTasks();
  closeUploadModal();
  openTaskDr(id);
}

  }
  document.querySelector('#modal-ov .modal-head div').textContent='Add new client account';
  ov.classList.add('open');
  const leads=TEAM.filter(m=>m.lead||m.admin);
  document.getElementById('modal-body').innerHTML=`
    <div style="background:var(--surf2);border-radius:var(--r);padding:12px 14px;margin-bottom:16px;font-size:12px;color:var(--tx2);">
      A new account space creates a dedicated Kanban board, overview, and task area for this client.
    </div>
    <div class="fi-row">
      <div class="fg" style="flex:2"><label class="fl">Client / Account name</label><input class="fi" id="ns-name" placeholder="e.g. Zomato" autofocus></div>
      <div class="fg" style="flex:0 0 80px"><label class="fl">Emoji</label><input class="fi" id="ns-emoji" placeholder="🍕" style="font-size:18px;text-align:center;" maxlength="2" value="📋"></div>
    </div>
    <div class="fg"><label class="fl">Mandate / Type of work</label><input class="fi" id="ns-type" placeholder="e.g. Performance Marketing + Social Media"></div>
    <div class="fi-row">
      <div class="fg"><label class="fl">Account lead</label>
        <select class="fi" id="ns-lead">${leads.map(m=>`<option value="${m.id}">${m.name} — ${m.role}</option>`).join('')}</select>
      </div>
      <div class="fg"><label class="fl">Colour</label>
        <select class="fi" id="ns-color">${['av-g','av-b','av-a','av-p','av-r','av-k','av-t','av-o'].map(c=>`<option value="${c}">${c.replace('av-','').toUpperCase()}</option>`).join('')}</select>
      </div>
    </div>
    <div class="divider"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn btn-sm" onclick="closeModal()">Cancel</button>

function createSpace(){
  const name=document.getElementById('ns-name')?.value?.trim();if(!name)return;
  const id=name.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'')+'_'+Date.now();
  const newAcct={id,name,type:document.getElementById('ns-type').value||'New mandate',lead:document.getElementById('ns-lead').value,emoji:document.getElementById('ns-emoji').value||'📋',color:document.getElementById('ns-color').value};
  ACCTS.push(newAcct);
  logAct(`Created new space: ${name}`,'announce');
  fbSaveAccounts();
  closeModal();buildAcctNav();
  // Navigate to new space
  const navEl=document.querySelector(`[data-v="acct-${id}"]`);
  if(navEl)goNav(navEl,'acct-'+id);
}
function openEditSpace(acctId){
  if(!cu.admin){alert('Only Karan (COO) can edit spaces.');return;}
  const a=gA(acctId);
  let ov=document.getElementById('modal-ov');
  if(!ov){ov=document.createElement('div');ov.id='modal-ov';ov.className='modal-ov';ov.innerHTML='<div class="modal-box" onclick="event.stopPropagation()"><div class="modal-head"><div style="font-size:14px;font-weight:600;flex:1;"></div><button class="btn btn-xs" onclick="closeModal()">✕</button></div><div class="modal-body" id="modal-body"></div></div>';ov.onclick=function(e){if(e.target===ov)closeModal();};document.body.appendChild(ov);}
  document.querySelector('#modal-ov .modal-head div').textContent='Edit space: '+a.name;
  ov.classList.add('open');
  document.getElementById('modal-body').innerHTML=`
    <div class="fg"><label class="fl">Account name</label><input class="fi" id="es-name" value="${a.name}"></div>
    <div class="fg"><label class="fl">Emoji</label><input class="fi" id="es-emoji" value="${a.emoji}" style="font-size:20px;" maxlength="2"></div>
    <div class="fg"><label class="fl">Type / Mandate</label><input class="fi" id="es-type" value="${a.type}"></div>
    <div class="fg"><label class="fl">Account lead</label><select class="fi" id="es-lead">${TEAM.filter(m=>m.lead).map(m=>`<option value="${m.id}" ${a.lead===m.id?'selected':''}>${m.name}</option>`).join('')}</select></div>
    <div class="divider"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn btn-sm btn-red" onclick="deleteSpace('${acctId}')">Delete space</button>
      <button class="btn btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-sm btn-dark" onclick="saveSpace('${acctId}')">Save</button>
    </div>`;
}
function saveSpace(id){
  const a=ACCTS.find(a=>a.id===id);if(!a)return;
  a.name=document.getElementById('es-name').value.trim()||a.name;
  a.emoji=document.getElementById('es-emoji').value||a.emoji;
  a.type=document.getElementById('es-type').value.trim()||a.type;
  a.lead=document.getElementById('es-lead').value;
  fbSaveAccounts();
  closeModal();buildAcctNav();renderView('acct-'+id);
}
function deleteSpace(id){
  if(!confirm('Delete this space and all its tasks? This cannot be undone.'))return;
  const idx=ACCTS.findIndex(a=>a.id===id);if(idx>-1)ACCTS.splice(idx,1);
  tasks=tasks.filter(t=>t.acct!==id);
  fbSaveAccounts();
  closeModal();buildAcctNav();goNav(document.querySelector('[data-v="dashboard"]'),'dashboard');
}


/* ══════ EXCEL EXPORT ══════ */
function getWeekStart(){
  const d=new Date();d.setHours(0,0,0,0);
  d.setDate(d.getDate()-d.getDay()+1); // Monday
  return d.toISOString().slice(0,10);
}
function exportAllExcel(){
  if(typeof XLSX==='undefined'){alert('SheetJS not loaded. Check internet connection.');return;}
  const wb=XLSX.utils.book_new();
  // Summary sheet
  const summaryData=[
    ['WireFlow Export — Wirality Media'],
    ['Generated',new Date().toLocaleString('en-IN')],
    [],
    ['Account','Open Tasks','In Review','Approved','High Priority'],
    ...ACCTS.map(a=>{
      const at=tasks.filter(t=>t.acct===a.id);
      return[a.name,at.filter(t=>t.stage!=='approved').length,at.filter(t=>t.stage==='review').length,at.filter(t=>t.stage==='approved').length,at.filter(t=>t.pri==='high').length];
    }),
    [],
    ['Total tasks',tasks.length,'','Approved',tasks.filter(t=>t.stage==='approved').length],
  ];
  const wsSummary=XLSX.utils.aoa_to_sheet(summaryData);
  wsSummary['!cols']=[{wch:28},{wch:14},{wch:14},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb,wsSummary,'Summary');
  // Per-account sheets
  ACCTS.forEach(a=>{
    const at=tasks.filter(t=>t.acct===a.id);
    const rows=[
      ['Task','Stage','Priority','Assignee','Start','Due','Subtasks Done','Comments'],
      ...at.map(t=>[
        t.name,
        STAGES.find(s=>s.id===t.stage)?.label||t.stage,
        t.pri,
        gT(t.who).name,
        t.start||'',
        t.due||'',
        t.subtasks?(t.subtasks.filter(s=>s.done).length+'/'+t.subtasks.length):'0/0',
        t.cmts?t.cmts.length:0,
      ])
    ];
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:36},{wch:18},{wch:10},{wch:14},{wch:12},{wch:12},{wch:14},{wch:10}];
    // Trim sheet name to 31 chars (Excel limit)
    XLSX.utils.book_append_sheet(wb,ws,a.name.substring(0,31));
  });
  // Pitches sheet
  const pitchRows=[
    ['Company','Stage','Value/mo','Contact','Owner','Docs'],
    ...pitches.map(p=>[p.name,p.stage,p.val,p.contact,gT(p.who).name,p.docs?p.docs.length:0])
  ];
  const wsPitch=XLSX.utils.aoa_to_sheet(pitchRows);
  wsPitch['!cols']=[{wch:24},{wch:14},{wch:12},{wch:24},{wch:14},{wch:8}];
  XLSX.utils.book_append_sheet(wb,wsPitch,'Pitches');
  XLSX.writeFile(wb,'WireFlow_Export_'+new Date().toISOString().slice(0,10)+'.xlsx');
  logAct('Exported full task report to Excel','doc');
}
function exportAccountExcel(acctId){
  if(typeof XLSX==='undefined'){alert('SheetJS not loaded. Check internet connection.');return;}
  const a=gA(acctId);
  const at=tasks.filter(t=>t.acct===acctId);
  const wb=XLSX.utils.book_new();
  const rows=[
    [a.name+' — Task Report'],
    ['Generated',new Date().toLocaleString('en-IN')],
    ['Account lead',gT(a.lead).name],
    [],
    ['Task','Stage','Priority','Assignee','Start','Due','Description','Subtasks','Comments'],
    ...at.map(t=>[
      t.name,
      STAGES.find(s=>s.id===t.stage)?.label||t.stage,
      t.pri,
      gT(t.who).name,
      t.start||'',
      t.due||'',
      t.desc||'',
      t.subtasks?(t.subtasks.filter(s=>s.done).length+'/'+t.subtasks.length):'0/0',
      t.cmts?t.cmts.map(c=>gT(c.u).name+': '+c.t).join(' | '):'',
    ])
  ];
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:36},{wch:18},{wch:10},{wch:14},{wch:12},{wch:12},{wch:30},{wch:12},{wch:40}];
  XLSX.utils.book_append_sheet(wb,ws,a.name.substring(0,31));
  XLSX.writeFile(wb,a.name.replace(/\s+/g,'_')+'_Tasks_'+new Date().toISOString().slice(0,10)+'.xlsx');
  logAct('Exported '+a.name+' task report to Excel','doc');
}

        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div class="lb-count">${m.count}</div>

}

/* ══════ HOOK APPROVALS INTO STAGE CHANGES ══════ */
// Wrap the existing stage-change logic to log approvals
function onStageChange(taskId, newStage){
  const t=tasks.find(t=>t.id===taskId);
  if(!t)return;
  if(newStage==='approved'){
    logApproval(t.name, t.who);
    logAct('"'+t.name.substring(0,40)+'" approved','task');
    fbSaveApprovals();
  }
  fbSaveTasks();
}
