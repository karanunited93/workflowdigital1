function renderChat() {
  var vc = document.getElementById('view-container');
  vc.style.cssText = 'flex:1;display:flex;overflow:hidden';

  var html = '<div id="chat-sidebar" style="width:200px;border-right:1px solid rgba(0,0,0,0.07);overflow-y:auto;flex-shrink:0">';
  html += '<div style="padding:10px 12px;font-size:11px;font-weight:600;color:#A8A69E;text-transform:uppercase;letter-spacing:0.6px;border-bottom:1px solid rgba(0,0,0,0.06)">Direct Messages</div>';

  var others = STATE.people.filter(function(p){return STATE.currentUser && p.id !== STATE.currentUser.id;});
  others.forEach(function(p) {
    var key = getChatKey(STATE.currentUser ? STATE.currentUser.id : '', p.id);
    var msgs = STATE.messages[key] || [];
    var last = msgs.length > 0 ? msgs[msgs.length-1] : null;
    var unread = msgs.filter(function(m){return m.to === (STATE.currentUser ? STATE.currentUser.id : '') && !m.read;}).length;
    var isActive = CHAT_PEER_ID === p.id;
    html += '<div class="chat-contact' + (isActive?' active':'') + '" onclick="openChatWith(\'' + p.id + '\')">';
    html += '<div class="av ' + p.color + '" style="position:relative;width:26px;height:26px;flex-shrink:0">' + p.initials;
    html += '<span style="position:absolute;bottom:0;right:0;width:7px;height:7px;border-radius:50%;background:#1D9E75;border:1.5px solid #fff"></span></div>';
    html += '<div style="flex:1;overflow:hidden"><div class="chat-contact-name">' + p.name.split(' ')[0] + '</div>';
    html += '<div class="chat-contact-preview">' + (last ? last.text.slice(0,30) : 'No messages') + '</div></div>';
    if (unread > 0) html += '<span class="chat-unread">' + unread + '</span>';
    html += '</div>';
  });
  html += '</div>';

  html += '<div id="chat-main" style="flex:1;display:flex;flex-direction:column;overflow:hidden">';
  if (!CHAT_PEER_ID) {
    html += '<div class="empty-state"><div class="empty-icon">💬</div><div>Select a person to message</div></div>';
  } else {
    var peer = getPerson(CHAT_PEER_ID);
    html += '<div style="padding:12px 16px;border-bottom:1px solid rgba(0,0,0,0.07);display:flex;align-items:center;gap:10px;flex-shrink:0">';
    html += '<div class="av ' + peer.color + '">' + peer.initials + '</div>';
    html += '<div><div style="font-size:13px;font-weight:600">' + peer.name + '</div><div style="font-size:11px;color:#1D9E75">Online</div></div></div>';
    html += '<div id="chat-messages" style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px">';
    html += buildChatMessages();
    html += '</div>';
    html += '<div id="chat-input-wrap" style="padding:12px;border-top:1px solid rgba(0,0,0,0.07);display:flex;gap:8px;align-items:flex-end">';
    html += avatarHtml(STATE.currentUser ? STATE.currentUser.id : '', 'sm');
    html += '<textarea id="chat-input" style="flex:1;padding:8px 11px;border-radius:6px;border:1px solid rgba(0,0,0,0.12);font-size:13px;resize:none;max-height:100px;overflow-y:auto;font-family:inherit" placeholder="Message ' + peer.name.split(' ')[0] + '..." onkeydown="chatKeydown(event)"></textarea>';
    html += '<button class="btn" onclick="sendChatMessage()" style="padding:8px 14px">↑</button>';
    html += '</div>';
  }
  html += '</div>';

  vc.innerHTML = html;
  // scroll to bottom
  var msgs = document.getElementById('chat-messages');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
  markMessagesRead();
}

function buildChatMessages() {
  if (!STATE.currentUser || !CHAT_PEER_ID) return '';
  var key = getChatKey(STATE.currentUser.id, CHAT_PEER_ID);
  var msgs = STATE.messages[key] || [];
  var html = '';
  msgs.forEach(function(m) {
    var mine = m.from === STATE.currentUser.id;
    html += '<div style="display:flex;gap:8px;max-width:75%;' + (mine ? 'align-self:flex-end;flex-direction:row-reverse' : '') + '">';
    if (!mine) html += avatarHtml(m.from, 'sm');
    html += '<div><div style="background:' + (mine ? '#18170F' : '#F5F4F0') + ';color:' + (mine ? '#fff' : '#18170F') + ';border-radius:8px;padding:8px 11px;font-size:12px;line-height:1.5">' + m.text + '</div>';
    html += '<div style="font-size:10px;color:#A8A69E;margin-top:2px;' + (mine ? 'text-align:right' : '') + '">' + timeAgo(m.time) + '</div></div>';
    html += '</div>';
  });
  return html;
}

function openChatWith(peerId) {
  CHAT_PEER_ID = peerId;
  markMessagesRead();
  renderChat();
}

function sendChatMessage() {
  var input = document.getElementById('chat-input');
  if (!input || !input.value.trim() || !STATE.currentUser || !CHAT_PEER_ID) return;
  var key = getChatKey(STATE.currentUser.id, CHAT_PEER_ID);
  STATE.messages[key] = STATE.messages[key] || [];
  var msg = {
    from: STATE.currentUser.id,
    to: CHAT_PEER_ID,
    text: input.value.trim(),
    time: new Date().toISOString(),
    read: false
  };
  STATE.messages[key].push(msg);
  input.value = '';
  saveToStorage();

  // Firebase real-time
  if (FB_DB) {
    try { FB_DB.ref('messages/' + key).set(STATE.messages[key]).catch(function(){}); } catch(e) {}
  }

  renderChat();
}

function chatKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMessage(); }
}

function markMessagesRead() {
  if (!STATE.currentUser || !CHAT_PEER_ID) return;
  var key = getChatKey(STATE.currentUser.id, CHAT_PEER_ID);
  var msgs = STATE.messages[key] || [];
  var changed = false;
  msgs.forEach(function(m) {
    if (m.to === STATE.currentUser.id && !m.read) { m.read = true; changed = true; }
  });
  if (changed) { saveToStorage(); updateChatBadge(); }
}

  html += '</select></div>';
  html += '<div class="form-group"><label class="form-label">Avatar Colour</label><select class="form-select" id="ap-color">';
  ['av-g','av-b','av-a','av-p','av-r','av-k','av-t','av-o'].forEach(function(c){html += '<option value="'+c+'">'+c.replace('av-','')+'</option>';});
  html += '</select></div>';
  html += '</div>';
  html += '<div class="modal-footer"><button class="btn-xs btn-ghost" onclick="closeModal()">Cancel</button>';
  html += '<button class="btn" onclick="createPerson()">Add Person</button></div></div>';
  showModal(html);
}

function createPerson() {
  var name = (document.getElementById('ap-name').value||'').trim();
  if (!name) { alert('Enter name'); return; }
  var initials = (document.getElementById('ap-initials').value||name.split(' ').map(function(w){return w[0];}).join('')).toUpperCase();
  var id = name.toLowerCase().replace(/\s+/g,'') + genId().slice(-4);
  var p = {id:id, name:name, initials:initials, role:document.getElementById('ap-role').value, color:document.getElementById('ap-color').value, permission:document.getElementById('ap-perm').value};
  STATE.people.push(p);
  logActivity('Task', p.name + ' added to the team');
  saveToStorage();
  closeModal();
  renderPeople();
  renderSidebar();
  renderTopbarActions();
}

function openEditPersonModal(personId) {
  var p = getPerson(personId);
  var html = '<div class="modal"><div class="modal-title">Edit Person</div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
  html += '<div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="ep-name" value="'+p.name+'"></div>';
  html += '<div class="form-group"><label class="form-label">Initials</label><input class="form-input" id="ep-initials" value="'+p.initials+'" maxlength="3"></div>';
  html += '</div>';
  html += '<div class="form-group"><label class="form-label">Role</label><input class="form-input" id="ep-role" value="'+p.role+'"></div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
  html += '<div class="form-group"><label class="form-label">Permission</label><select class="form-select" id="ep-perm">';
  ['member','lead','admin'].forEach(function(x){html += '<option value="'+x+'"'+(p.permission===x?' selected':'')+'>'+{member:'Member',lead:'Account Lead',admin:'Admin'}[x]+'</option>';});
  html += '</select></div>';
  html += '<div class="form-group"><label class="form-label">Avatar Colour</label><select class="form-select" id="ep-color">';
  ['av-g','av-b','av-a','av-p','av-r','av-k','av-t','av-o'].forEach(function(c){html += '<option value="'+c+'"'+(p.color===c?' selected':'')+'>'+c.replace('av-','')+'</option>';});
  html += '</select></div></div>';
  html += '<div class="modal-footer">';
  if (!STATE.currentUser || personId !== STATE.currentUser.id) {
    html += '<button class="btn-xs btn-danger" onclick="removePerson(\''+personId+'\')">Remove</button>';
  }
  html += '<span style="flex:1"></span>';
  html += '<button class="btn-xs btn-ghost" onclick="closeModal()">Cancel</button>';
  html += '<button class="btn" onclick="savePerson(\''+personId+'\')">Save</button></div></div>';
  showModal(html);
}

function savePerson(personId) {
  var p = getPerson(personId);
  if (!p) return;
  p.name = document.getElementById('ep-name').value;
  p.initials = document.getElementById('ep-initials').value.toUpperCase();
  p.role = document.getElementById('ep-role').value;
  p.permission = document.getElementById('ep-perm').value;
  p.color = document.getElementById('ep-color').value;
  // Keep currentUser reference in sync if editing self
  if (STATE.currentUser && STATE.currentUser.id === personId) {
    STATE.currentUser = p;
  }
  saveToStorage();
  closeModal();
  renderPeople();
  renderSidebar();
}

function removePerson(personId) {
  if (!isAdmin()) return;
  if (STATE.currentUser && personId === STATE.currentUser.id) { alert("Can't remove yourself"); return; }
  if (!confirm('Remove this person from WireFlow?')) return;
  STATE.people = STATE.people.filter(function(p){return p.id !== personId;});
  saveToStorage();
  closeModal();
  renderPeople();
  renderSidebar();
}

// ============================================================
// LEADERBOARD
// ============================================================
function renderLeaderboard() {
  var vc = document.getElementById('view-container');
  vc.style.cssText = 'flex:1;overflow:hidden;display:flex;flex-direction:column';
  var lb = STATE.leaderboard;

  var html = '<div style="padding:16px 18px;overflow-y:auto;flex:1">';
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:12px;color:#A8A69E"><span>Week of ' + STATE.weekStart + '</span><span>· Resets every Monday</span></div>';

  if (lb.length === 0) {
    html += '<div style="text-align:center;color:#A8A69E;padding:40px;font-size:13px"><div style="font-size:32px;margin-bottom:10px">🏆</div>No approvals logged this week yet.</div>';
  } else {
    var top = lb[0];
    var topPerson = getPerson(top.id);
    html += '<div class="hero-card"><div class="hero-crown">👑</div>';
    html += '<div class="av av-lg ' + topPerson.color + '">' + topPerson.initials + '</div>';
    html += '<div><div class="hero-name">' + topPerson.name + '</div>';
    html += '<div class="hero-score">' + top.count + ' tasks approved this week</div></div></div>';

    html += '<div>';
    lb.forEach(function(entry, i) {
      var p = getPerson(entry.id);
      var medals = ['🥇','🥈','🥉'];
      var pct = Math.round((entry.count / lb[0].count) * 100);
      html += '<div class="lb-row">';
      html += '<div class="lb-rank">' + (medals[i] || (i+1)) + '</div>';
      html += '<div class="av ' + p.color + '">' + p.initials + '</div>';
      html += '<div class="lb-name">' + p.name + '</div>';
      html += '<div class="lb-score">' + entry.count + '</div>';
      html += '<div class="lb-bar"><div class="lb-fill" style="width:' + pct + '%"></div></div>';
      html += '</div>';
    });
    html += '</div>';

    // Recent approvals
    html += '<div style="margin-top:16px"><div style="font-size:11px;font-weight:600;color:#A8A69E;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Recent Approvals</div>';
    var recent = [];
    lb.forEach(function(entry) {
      (entry.tasks||[]).forEach(function(t) {
        recent.push({name:getPerson(entry.id).name, task:t.title, time:t.time});
      });
    });
    recent.sort(function(a,b){return new Date(b.time) - new Date(a.time);});
    recent.slice(0,8).forEach(function(r) {
      html += '<div class="log-item"><span class="log-tag log-tag-task">Task</span>';
      html += '<div><div class="log-text">"'+r.task+'" approved</div><div class="log-time">'+r.name+' · '+timeAgo(r.time)+'</div></div></div>';
    });
    html += '</div>';
  }

  html += '</div>';
  vc.innerHTML = html;
}

// ============================================================
// USER PICKER
// ============================================================
function openUserPicker() {
  var html = '<div class="modal"><div class="modal-title">Switch User</div>';
  html += '<div style="margin-bottom:4px;font-size:12px;color:#A8A69E">Select a team member to view WireFlow from their perspective</div>';
  html += '<div style="margin-top:12px;display:flex;flex-direction:column;gap:5px">';
  STATE.people.forEach(function(p) {
    var isActive = STATE.currentUser && p.id === STATE.currentUser.id;
    var bg = isActive ? '#F5F4F0' : '#fff';
    var bd = isActive ? 'rgba(0,0,0,0.1)' : 'rgba(0,0,0,0.06)';
    html += '<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:6px;background:' + bg + ';border:1px solid ' + bd + '">';
    html += '<div onclick="switchUser(\'' + p.id + '\')" style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer">';
    html += '<div class="av ' + p.color + '">' + p.initials + '</div>';
    var permLabel = {admin:'Admin',lead:'Lead',member:'Member'}[p.permission] || 'Member';
    html += '<div><div style="font-size:13px;font-weight:500">' + p.name + '</div>';
    html += '<div style="font-size:11px;color:#A8A69E">' + p.role + ' \u00b7 ' + permLabel + '</div></div>';
    if (isActive) html += '<div style="font-size:11px;color:#1D9E75;font-weight:600;margin-left:6px">Active</div>';
    html += '</div>';
    if (isAdmin()) {
      html += '<button class="btn-xs" onclick="closeModal();setTimeout(function(){openEditPersonModal(\'' + p.id + '\')},50)">Edit</button>';
    }
    html += '</div>';
  });
  html += '</div><div class="modal-footer">';
  if (isAdmin()) {
    html += '<button class="btn" style="margin-right:auto" onclick="closeModal();setTimeout(function(){openAddPersonModal()},50)">+ Add Member</button>';
  }
  html += '<button class="btn-xs btn-ghost" onclick="closeModal()">Cancel</button>';
  html += '</div></div>';
  showModal(html);
}

function switchUser(personId) {
  var p = getPerson(personId);
  STATE.currentUser = p;
  saveToStorage();
  closeModal();
  renderSidebar();
  navigate(STATE.currentView, STATE.currentAcct);
}

// ============================================================
// MODAL HELPERS
// ============================================================
function showModal(html) {
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay';
  overlay.innerHTML = html;
  overlay.addEventListener('click', function(e){ if (e.target === overlay) closeModal(); });
  document.body.appendChild(overlay);
}

function closeModal() {
  var el = document.getElementById('modal-overlay');
  if (el) el.parentNode.removeChild(el);
}

// ============================================================
// EXCEL EXPORT
// ============================================================
function exportAllExcel() {
  var wb = XLSX.utils.book_new();
  var rows = [['Account','Task','Stage','Priority','Assignee','Due Date','Start Date']];
  STATE.tasks.forEach(function(t) {
    var acct = getAccount(t.acctId);
    var stages = acct ? acct.stages : ['Backlog','Planning','In Progress','Ready for Review','Approved','Rejected'];
    rows.push([
      acct ? acct.name : t.acctId,
      t.title,
      stages[t.stage] || '',
      t.priority,
      getPerson(t.assignee).name,
      t.dueDate,
      t.startDate
    ]);
  });
  var ws = XLSX.utils.aoa_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb, ws, 'All Tasks');

  // Pitches sheet
  var prows = [['Company','Stage','Value/mo','Contact','Source','Owner','Docs']];
  STATE.pitches.forEach(function(p) {
    prows.push([p.company, PITCH_STAGES[p.stage], p.value, p.contact, p.source, getPerson(p.owner).name, (p.docs||[]).length]);
  });
  var ws2 = XLSX.utils.aoa_to_sheet(prows);
  XLSX.utils.book_append_sheet(wb, ws2, 'Pitches');

  XLSX.writeFile(wb, 'WireFlow_Export_' + new Date().toISOString().slice(0,10) + '.xlsx');
}

function exportAcctExcel(acctId) {
  var acct = getAccount(acctId);
  if (!acct) return;
  var stages = acct.stages;
  var wb = XLSX.utils.book_new();
  var rows = [['Task','Stage','Priority','Assignee','Start Date','Due Date','Description']];
  STATE.tasks.filter(function(t){return t.acctId === acctId;}).forEach(function(t) {
    rows.push([t.title, stages[t.stage]||'', t.priority, getPerson(t.assignee).name, t.startDate, t.dueDate, t.description]);
  });
  var ws = XLSX.utils.aoa_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb, ws, acct.name);
  XLSX.writeFile(wb, acct.name.replace(/\s+/g,'_') + '_Tasks_' + new Date().toISOString().slice(0,10) + '.xlsx');
}

// INIT
// ============================================================
function init() {
  loadFromStorage();
  renderSidebar();
  navigate('dashboard');
  initFirebase();
  setTimeout(function() { loadFromFirebase(); }, 1500);
}

document.addEventListener('DOMContentLoaded', init);
</script>
