<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WireFlow — Wirality Media</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F5F4F0;color:#18170F;font-size:14px;line-height:1.5;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.18);border-radius:4px}
a{color:inherit;text-decoration:none}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;outline:none}
input,textarea,select{font-family:'DM Sans',sans-serif;outline:none;border:none}
/* Layout */
#app{display:flex;height:100vh;width:100vw}
#sidebar{width:220px;min-width:220px;background:#fff;border-right:1px solid rgba(0,0,0,0.08);display:flex;flex-direction:column;overflow:hidden}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:50px;min-height:50px;background:#fff;border-bottom:1px solid rgba(0,0,0,0.08);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0}
#content{flex:1;overflow:hidden;display:flex;position:relative}
/* Sidebar */
.sb-logo{padding:14px 16px 10px;border-bottom:1px solid rgba(0,0,0,0.06);display:flex;align-items:center;gap:8px}
.sb-logo-mark{width:28px;height:28px;background:#18170F;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;letter-spacing:-0.5px}
.sb-logo-text{font-size:15px;font-weight:600;letter-spacing:-0.3px}
.sb-logo-sub{font-size:10px;color:#A8A69E;font-weight:400;letter-spacing:0.2px}
.sb-section{padding:10px 8px 2px;font-size:10px;font-weight:600;color:#A8A69E;letter-spacing:0.8px;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;cursor:pointer;color:#6A6860;font-size:13px;font-weight:500;margin:1px 6px;transition:background 0.12s,color 0.12s}
.sb-item:hover{background:#F5F4F0;color:#18170F}
.sb-item.active{background:#18170F;color:#fff}
.sb-item .sb-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sb-item .sb-badge{margin-left:auto;background:rgba(201,64,64,0.12);color:#C94040;font-size:10px;font-weight:600;padding:1px 5px;border-radius:10px}
.sb-item.active .sb-badge{background:rgba(255,255,255,0.2);color:#fff}
.sb-clients{overflow-y:auto;flex:1}
.sb-user{padding:10px 10px;border-top:1px solid rgba(0,0,0,0.06);cursor:pointer}
.sb-user-inner{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;transition:background 0.12s}
.sb-user-inner:hover{background:#F5F4F0}
.sb-user-name{font-size:12px;font-weight:600;color:#18170F}
.sb-user-role{font-size:10px;color:#A8A69E}
/* Avatars */
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;flex-shrink:0;position:relative}
.av.av-g{background:#D1F0E5;color:#0D6B4E}
.av.av-b{background:#D0E8F9;color:#1A5A9A}
.av.av-a{background:#FDE8C8;color:#8B5200}
.av.av-p{background:#E5DCFF;color:#4A2F90}
.av.av-r{background:#FDDCDC;color:#8B1A1A}
.av.av-k{background:#E8E5D8;color:#5A5030}
.av.av-t{background:#E4DDD4;color:#5A4030}
.av.av-o{background:#FFE8D0;color:#8B3A00}
.av-lg{width:36px;height:36px;font-size:13px}
.av-sm{width:22px;height:22px;font-size:9px}
.av-online::after{content:'';position:absolute;bottom:0;right:0;width:7px;height:7px;border-radius:50%;background:#1D9E75;border:1.5px solid #fff}
/* Topbar */
.tb-title{font-size:15px;font-weight:600;letter-spacing:-0.2px;flex:1}
.tb-sub{font-size:12px;color:#A8A69E;font-weight:400}
.btn-xs{padding:4px 10px;border-radius:5px;font-size:12px;font-weight:500;background:#F5F4F0;color:#18170F;border:1px solid rgba(0,0,0,0.1);transition:background 0.12s}
.btn-xs:hover{background:#EFEDE7}
.btn-sm{padding:5px 11px;border-radius:5px;font-size:12px;font-weight:500;background:#F5F4F0;color:#18170F;border:1px solid rgba(0,0,0,0.1);transition:background 0.12s}
.btn-sm:hover{background:#EFEDE7}
.btn{padding:6px 12px;border-radius:5px;font-size:13px;font-weight:500;background:#18170F;color:#fff;transition:background 0.15s}
.btn:hover{background:#2a291f}
.btn-danger{background:#C94040;color:#fff}
.btn-danger:hover{background:#a83232}
.btn-ghost{background:transparent;color:#6A6860;border:1px solid rgba(0,0,0,0.1)}
.btn-ghost:hover{background:#F5F4F0;color:#18170F}
/* Cards */
.card{background:#fff;border-radius:8px;border:1px solid rgba(0,0,0,0.08)}
/* Priority badges */
.pri{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px}
.pri-urgent{background:#FDDCDC;color:#C94040}
.pri-high{background:#FDE8C8;color:#D4840A}
.pri-medium{background:#D0E8F9;color:#2B7FD4}
.pri-low{background:#E8E5D8;color:#6A6860}
/* Status badges */
.stage-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;white-space:nowrap}
.stage-0{background:#F5F4F0;color:#6A6860}
.stage-1{background:#D0E8F9;color:#1A5A9A}
.stage-2{background:#FDE8C8;color:#8B5200}
.stage-3{background:#E5DCFF;color:#4A2F90}
.stage-4{background:#D1F0E5;color:#0D6B4E}
.stage-5{background:#FDDCDC;color:#C94040}
/* Stat cards */
.stat-card{background:#fff;border-radius:8px;border:1px solid rgba(0,0,0,0.08);padding:16px 18px}
.stat-num{font-size:28px;font-weight:600;letter-spacing:-1px;line-height:1}
.stat-label{font-size:11px;color:#6A6860;margin-top:4px;font-weight:500}
.stat-icon{font-size:18px;margin-bottom:8px}
/* Forms */
.form-group{margin-bottom:12px}
.form-label{font-size:11px;font-weight:600;color:#6A6860;margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.5px}
.form-input{width:100%;padding:8px 10px;border-radius:6px;border:1px solid rgba(0,0,0,0.12);background:#fff;font-size:13px;color:#18170F;transition:border 0.12s}
.form-input:focus{border-color:rgba(0,0,0,0.3)}
.form-select{width:100%;padding:7px 10px;border-radius:6px;border:1px solid rgba(0,0,0,0.12);background:#fff;font-size:13px;color:#18170F;appearance:none;cursor:pointer}
.form-textarea{width:100%;padding:8px 10px;border-radius:6px;border:1px solid rgba(0,0,0,0.12);background:#fff;font-size:13px;color:#18170F;resize:vertical;min-height:70px}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(24,23,15,0.4);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:12px;padding:24px;min-width:360px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:18px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid rgba(0,0,0,0.07)}
/* Task panel */
#task-panel{position:absolute;right:0;top:0;bottom:0;width:680px;background:#fff;border-left:1px solid rgba(0,0,0,0.08);display:flex;flex-direction:column;z-index:100;transform:translateX(100%);transition:transform 0.2s ease}
#task-panel.open{transform:translateX(0)}
#task-panel-inner{display:flex;height:100%;overflow:hidden}
.tp-left{flex:1;overflow-y:auto;padding:20px;border-right:1px solid rgba(0,0,0,0.07)}
.tp-right{width:260px;overflow-y:auto;padding:16px}
.tp-title{font-size:18px;font-weight:600;letter-spacing:-0.3px;width:100%;border:none;background:transparent;resize:none;line-height:1.4;color:#18170F;margin-bottom:14px}
.tp-field-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.tp-field{flex:1;min-width:120px}
.tp-field label{font-size:10px;font-weight:600;color:#A8A69E;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px}
.tp-field select,.tp-field input{width:100%;padding:6px 8px;border-radius:5px;border:1px solid rgba(0,0,0,0.1);font-size:12px;background:#fff;color:#18170F}
.tp-desc{width:100%;border:1px solid rgba(0,0,0,0.1);border-radius:6px;padding:8px 10px;font-size:13px;color:#18170F;resize:vertical;min-height:80px;margin-bottom:14px}
.subtask-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,0.05)}
.subtask-check{width:14px;height:14px;border-radius:3px;cursor:pointer;flex-shrink:0;accent-color:#1D9E75}
.subtask-text{flex:1;font-size:12px}
.subtask-text.done{text-decoration:line-through;color:#A8A69E}
.subtask-del{color:#A8A69E;font-size:11px;cursor:pointer;padding:2px 4px;border-radius:3px;background:transparent}
.subtask-del:hover{background:#FDDCDC;color:#C94040}
.del-btn:hover{color:#C94040 !important}
.checklist-item{display:flex;align-items:center;gap:8px;padding:4px 0}
.act-item{display:flex;gap:8px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(0,0,0,0.05)}
.act-item:last-child{border-bottom:none}
.act-text{font-size:11px;color:#6A6860;line-height:1.5}
.act-time{font-size:10px;color:#A8A69E}
.comment-input-wrap{display:flex;gap:7px;margin-top:10px;align-items:flex-start}
.comment-input{flex:1;padding:7px 9px;border-radius:6px;border:1px solid rgba(0,0,0,0.12);font-size:12px;resize:none;min-height:60px}
/* Kanban */
.board-wrap{width:100%;height:100%;overflow-x:auto;overflow-y:hidden;display:flex;gap:11px;padding:14px}
.col-wrap{width:230px;min-width:230px;flex-shrink:0;display:flex;flex-direction:column;height:calc(100vh - 158px)}
.col-head{padding:8px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.col-title{font-size:12px;font-weight:600;color:#6A6860}
.col-count{font-size:10px;color:#A8A69E;background:#F5F4F0;padding:1px 6px;border-radius:10px}
.col-cards{flex:1;overflow-y:auto;padding:7px}
.task-card{background:#fff;border-radius:8px;border:1px solid rgba(0,0,0,0.08);padding:10px;margin-bottom:7px;cursor:pointer;transition:box-shadow 0.12s,border-color 0.12s}
.task-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08);border-color:rgba(0,0,0,0.14)}
.task-card-title{font-size:12px;font-weight:500;color:#18170F;margin-bottom:7px;line-height:1.4}
.task-card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.due-date{font-size:10px;color:#6A6860}
.due-date.overdue{color:#C94040;font-weight:600}
.add-task-btn{width:100%;padding:7px;text-align:left;font-size:12px;color:#A8A69E;background:transparent;border:1px dashed rgba(0,0,0,0.12);border-radius:6px;cursor:pointer;margin:4px 0;transition:all 0.12s}
.add-task-btn:hover{background:#F5F4F0;color:#18170F;border-color:rgba(0,0,0,0.2)}
/* Pitches Kanban */
.pitch-card{background:#fff;border-radius:8px;border:1px solid rgba(0,0,0,0.08);padding:12px;margin-bottom:8px;cursor:pointer;transition:box-shadow 0.12s}
.pitch-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.pitch-company{font-size:13px;font-weight:600;color:#18170F}
.pitch-value{font-size:11px;color:#1D9E75;font-weight:600}
/* Ops */
.ops-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(0,0,0,0.06);font-size:12px}
.ops-row:hover{background:#FAFAF8}
.ops-name{flex:2;font-weight:500}
.ops-assignee{flex:1;display:flex;align-items:center;gap:6px}
.ops-stage{flex:1}
.ops-dates{flex:1.5;color:#6A6860;font-size:11px}
.ops-prog{flex:1.5}
.prog-bar{height:4px;background:#EFEDE7;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#1D9E75;border-radius:2px;transition:width 0.3s}
/* Activity */
.log-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.05)}
.log-tag{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;flex-shrink:0;margin-top:2px;letter-spacing:0.4px}
.log-tag-task{background:#D0E8F9;color:#1A5A9A}
.log-tag-pitch{background:#E5DCFF;color:#4A2F90}
.log-tag-doc{background:#FDE8C8;color:#8B5200}
.log-tag-announce{background:#D1F0E5;color:#0D6B4E}
.log-text{font-size:12px;color:#18170F;line-height:1.5}
.log-time{font-size:10px;color:#A8A69E;margin-top:2px}
/* Chat */
#chat-sidebar{width:200px;border-right:1px solid rgba(0,0,0,0.07);overflow-y:auto;flex-shrink:0}
#chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-contact{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;border-bottom:1px solid rgba(0,0,0,0.05);transition:background 0.1s}
.chat-contact:hover{background:#F5F4F0}
.chat-contact.active{background:#F5F4F0}
.chat-contact-name{font-size:12px;font-weight:500;flex:1}
.chat-contact-preview{font-size:10px;color:#A8A69E;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
.chat-unread{background:#C94040;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;flex-shrink:0}
#chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px}
.msg-wrap{display:flex;gap:8px;max-width:75%}
.msg-wrap.mine{align-self:flex-end;flex-direction:row-reverse}
.msg-bubble{background:#F5F4F0;border-radius:8px;padding:8px 11px;font-size:12px;line-height:1.5}
.msg-bubble.mine{background:#18170F;color:#fff}
.msg-time{font-size:10px;color:#A8A69E;margin-top:2px}
#chat-input-wrap{padding:12px;border-top:1px solid rgba(0,0,0,0.07);display:flex;gap:8px;align-items:flex-end}
#chat-input{flex:1;padding:8px 11px;border-radius:6px;border:1px solid rgba(0,0,0,0.12);font-size:13px;resize:none;max-height:100px;overflow-y:auto}
/* People */
.person-card{background:#fff;border-radius:8px;border:1px solid rgba(0,0,0,0.08);padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;cursor:default;transition:box-shadow 0.12s}
.person-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.07)}
.person-name{font-size:13px;font-weight:600}
.person-role{font-size:11px;color:#6A6860}
.perm-label{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px}
.perm-admin{background:#FDDCDC;color:#C94040}
.perm-lead{background:#D1F0E5;color:#0D6B4E}
.perm-member{background:#EFEDE7;color:#6A6860}
.task-count{font-size:11px;color:#A8A69E}
/* Leaderboard */
.hero-card{background:#18170F;color:#fff;border-radius:12px;padding:22px 24px;display:flex;align-items:center;gap:16px;margin-bottom:18px}
.hero-crown{font-size:28px}
.hero-name{font-size:18px;font-weight:600}
.hero-score{font-size:13px;opacity:0.6;margin-top:2px}
.lb-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;margin-bottom:6px;background:#fff;border:1px solid rgba(0,0,0,0.07)}
.lb-rank{font-size:18px;width:28px;text-align:center}
.lb-name{flex:1;font-size:13px;font-weight:500}
.lb-score{font-size:12px;font-weight:600;color:#1D9E75;margin-right:8px}
.lb-bar{flex:2;height:5px;background:#EFEDE7;border-radius:3px;overflow:hidden}
.lb-fill{height:100%;background:#1D9E75;border-radius:3px}
/* Dashboard */
.dash-col{flex:1;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
.dash-section-title{font-size:11px;font-weight:600;color:#A8A69E;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px}
.dash-task-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#fff;border-radius:6px;border:1px solid rgba(0,0,0,0.07);cursor:pointer;transition:border-color 0.1s}
.dash-task-item:hover{border-color:rgba(0,0,0,0.16)}
.dash-task-name{flex:1;font-size:12px;font-weight:500}
/* Section headers in panels */
.panel-section-head{font-size:11px;font-weight:600;color:#6A6860;text-transform:uppercase;letter-spacing:0.5px;margin:14px 0 7px;display:flex;align-items:center;justify-content:space-between}
/* Attachment */
.attach-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:#F5F4F0;border-radius:5px;margin-bottom:5px;font-size:11px}
.attach-link{color:#2B7FD4;text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attach-type{font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;background:#EFEDE7;color:#6A6860}
/* Pitch drawer overlay */
#pitch-panel{position:absolute;right:0;top:0;bottom:0;width:480px;background:#fff;border-left:1px solid rgba(0,0,0,0.08);z-index:50;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.2s ease;overflow-y:auto}
#pitch-panel.open{transform:translateX(0)}
/* Misc */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#A8A69E;font-size:13px;gap:8px}
.empty-icon{font-size:32px}
.divider{height:1px;background:rgba(0,0,0,0.07);margin:12px 0}
.dot-red{width:7px;height:7px;border-radius:50%;background:#C94040;flex-shrink:0}
.dot-green{width:7px;height:7px;border-radius:50%;background:#1D9E75;flex-shrink:0}
.tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;display:inline-flex}
.section-pad{padding:18px 20px;overflow-y:auto;flex:1}
.all-docs-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid rgba(0,0,0,0.05);font-size:12px}
.all-docs-row:hover{background:#FAFAF8}
/* tooltip */
[title]{cursor:help}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-mark">WF</div>
      <div>
        <div class="sb-logo-text">WireFlow</div>
        <div class="sb-logo-sub">Wirality Media</div>
      </div>
    </div>
    <div style="overflow-y:auto;flex:1;padding-bottom:4px">
      <div class="sb-section">Navigation</div>
      <div class="sb-item" id="nav-dashboard" onclick="navigate('dashboard')">
        <div class="sb-icon">⚡</div> Dashboard
      </div>
      <div class="sb-item" id="nav-pitches" onclick="navigate('pitches')">
        <div class="sb-icon">🎯</div> Pitches
      </div>
      <div class="sb-item" id="nav-ops" onclick="navigate('ops')">
        <div class="sb-icon">⚙️</div> Internal Ops
      </div>
      <div class="sb-item" id="nav-activity" onclick="navigate('activity')">
        <div class="sb-icon">📋</div> Activity Log
      </div>
      <div class="sb-item" id="nav-chat" onclick="navigate('chat')">
        <div class="sb-icon">💬</div> Chat
        <div class="sb-badge" id="chat-badge" style="display:none">0</div>
      </div>
      <div class="sb-item" id="nav-people" onclick="navigate('people')">
        <div class="sb-icon">👥</div> People
      </div>
      <div class="sb-item" id="nav-leaderboard" onclick="navigate('leaderboard')">
        <div class="sb-icon">🏆</div> Leaderboard
      </div>
      <div class="sb-section" style="margin-top:6px">Clients</div>
      <div id="sb-clients"></div>
    </div>
    <div class="sb-user" onclick="openUserPicker()">
      <div class="sb-user-inner" id="sb-user-display">
        <!-- filled dynamically -->
      </div>
    </div>
  </div>
  <div id="main">
    <div id="topbar">

function saveToStorage() {
  try {
    localStorage.setItem('wf_tasks', JSON.stringify(STATE.tasks));
    localStorage.setItem('wf_accounts', JSON.stringify(STATE.accounts));
    localStorage.setItem('wf_pitches', JSON.stringify(STATE.pitches));
    localStorage.setItem('wf_opsTasks', JSON.stringify(STATE.opsTasks));
    localStorage.setItem('wf_people', JSON.stringify(STATE.people));
    localStorage.setItem('wf_activityLog', JSON.stringify(STATE.activityLog));
    localStorage.setItem('wf_messages', JSON.stringify(STATE.messages));
    localStorage.setItem('wf_leaderboard', JSON.stringify(STATE.leaderboard));
    localStorage.setItem('wf_weekStart', STATE.weekStart);
    localStorage.setItem('wf_currentUserId', STATE.currentUser ? STATE.currentUser.id : 'karan');
  } catch(e) {}
  syncToFirebase();
}

function loadFromStorage() {
  try {
    var tasks = localStorage.getItem('wf_tasks');
    var accounts = localStorage.getItem('wf_accounts');
    var pitches = localStorage.getItem('wf_pitches');
    var opsTasks = localStorage.getItem('wf_opsTasks');
    var people = localStorage.getItem('wf_people');
    var activityLog = localStorage.getItem('wf_activityLog');
    var messages = localStorage.getItem('wf_messages');
    var leaderboard = localStorage.getItem('wf_leaderboard');
    var weekStart = localStorage.getItem('wf_weekStart');
    var userId = localStorage.getItem('wf_currentUserId') || 'karan';

    STATE.tasks = tasks ? JSON.parse(tasks) : defaultTasks();
    STATE.accounts = accounts ? JSON.parse(accounts) : defaultAccounts();
    STATE.pitches = pitches ? JSON.parse(pitches) : defaultPitches();
    STATE.opsTasks = opsTasks ? JSON.parse(opsTasks) : defaultOpsTasks();
    STATE.people = people ? JSON.parse(people) : defaultPeople();
    STATE.activityLog = activityLog ? JSON.parse(activityLog) : [];
    STATE.messages = messages ? JSON.parse(messages) : {};
    STATE.leaderboard = leaderboard ? JSON.parse(leaderboard) : [];
    STATE.weekStart = weekStart || getMondayStr();

    // reset leaderboard if new week
    var mon = getMondayStr();
    if (STATE.weekStart !== mon) {
      STATE.leaderboard = [];
      STATE.weekStart = mon;
    }

    var found = STATE.people.find(function(p){return p.id === userId;});
    STATE.currentUser = found || STATE.people[0];
  } catch(e) {
    STATE.tasks = defaultTasks();
    STATE.accounts = defaultAccounts();
    STATE.pitches = defaultPitches();
    STATE.opsTasks = defaultOpsTasks();
    STATE.people = defaultPeople();
    STATE.currentUser = STATE.people[0];
    STATE.activityLog = [];
    STATE.messages = {};
    STATE.leaderboard = [];
    STATE.weekStart = getMondayStr();
  }
}

function getMondayStr() {
  var d = new Date();
  var day = d.getDay();
  var diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff);
  return d.toISOString().slice(0,10);
}

function loadFromFirebase() {
  if (!FB_DB) return;
  setTimeout(function() {
    try {
      FB_DB.ref('tasks').once('value').then(function(snap) {

          var val = snap.val();
          if (val && Array.isArray(val) && val.length > STATE.tasks.length) {
            STATE.tasks = val;
            localStorage.setItem('wf_tasks', JSON.stringify(STATE.tasks));
            if (STATE.currentView === 'dashboard') renderDashboard();
            if (STATE.currentAcct) renderAcct(STATE.currentAcct);
          }
        } catch(e) {}
      }).catch(function(){});
    } catch(e) {}
    try {
      FB_DB.ref('pitches').once('value').then(function(snap) {
        try {
          var val = snap.val();
          if (val && Array.isArray(val) && val.length > STATE.pitches.length) {
            STATE.pitches = val;
          }
        } catch(e) {}
      }).catch(function(){});
    } catch(e) {}
  }, 1500);

// ============================================================
// HELPERS
// ============================================================
function genId() {
  return 'id-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7);
}

function getPerson(id) {
  return STATE.people.find(function(p){return p.id === id;}) || {id:'?', name:'Unknown', initials:'?', color:'av-k', permission:'member', role:''};
}

function getAccount(id) {
  return STATE.accounts.find(function(a){return a.id === id;});
}

function isAdmin() {
  return STATE.currentUser && STATE.currentUser.permission === 'admin';
}

function isLead() {
  return STATE.currentUser && (STATE.currentUser.permission === 'lead' || STATE.currentUser.permission === 'admin');
}

function canEditTask(task) {
  if (!STATE.currentUser) return false;
  if (isAdmin()) return true;
  if (isLead()) return true;
  return task.assignee === STATE.currentUser.id;
}

function formatDate(str) {
  if (!str) return '';
  var d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-IN', {day:'numeric', month:'short'});
}

function isOverdue(str) {
  if (!str) return false;
  var d = new Date(str + 'T00:00:00');
  return d < new Date(new Date().toDateString());
}

function timeAgo(iso) {
  if (!iso) return '';
  var diff = Date.now() - new Date(iso).getTime();
  var mins = Math.floor(diff/60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  var hrs = Math.floor(mins/60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs/24) + 'd ago';
}

function priBadge(p) {
  var cls = {urgent:'pri-urgent',high:'pri-high',medium:'pri-medium',low:'pri-low'}[p] || 'pri-low';
  return '<span class="pri ' + cls + '">' + (p ? p.charAt(0).toUpperCase()+p.slice(1) : 'Low') + '</span>';
}

function stageBadge(idx, stages) {
  if (!stages) stages = ['Backlog','Planning','In Progress','Ready for Review','Approved','Rejected'];
  return '<span class="stage-badge stage-' + Math.min(idx,5) + '">' + (stages[idx] || 'Unknown') + '</span>';
}

function avatarHtml(personId, size) {
  var p = getPerson(personId);
  var cls = 'av ' + p.color + (size === 'lg' ? ' av-lg' : size === 'sm' ? ' av-sm' : '');
  return '<div class="' + cls + '" title="' + p.name + '">' + p.initials + '</div>';
}

function logActivity(type, text) {
  var entry = {
    id: genId(),
    type: type,
    text: text,
    user: STATE.currentUser ? STATE.currentUser.name : 'System',
    time: new Date().toISOString()
  };
  STATE.activityLog.unshift(entry);
  if (STATE.activityLog.length > 200) STATE.activityLog = STATE.activityLog.slice(0,200);
  saveToStorage();
}

function updateChatBadge() {
  var badge = document.getElementById('chat-badge');
  if (!badge || !STATE.currentUser) return;
  var total = 0;
  Object.keys(STATE.messages).forEach(function(key) {
    var parts = key.split('_');
    if (parts.indexOf(STATE.currentUser.id) >= 0) {
      var msgs = STATE.messages[key];
      if (!Array.isArray(msgs)) return;
      msgs.forEach(function(m) {
        if (m.to === STATE.currentUser.id && !m.read) total++;
      });
    }
  });
  if (total > 0) {
    badge.textContent = total;
    badge.style.display = 'inline-flex';
  } else {
    badge.style.display = 'none';
  }
}

function getChatKey(a, b) {
  return [a, b].sort().join('_');
}

// ============================================================
// NAVIGATION
// ============================================================
function navigate(view, acctId) {
  closeTaskPanel();
  closePitchPanel();
  STATE.currentView = view;
  STATE.currentAcct = acctId || null;

  // Update sidebar active
  ['dashboard','pitches','ops','activity','chat','people','leaderboard'].forEach(function(v) {
    var el = document.getElementById('nav-' + v);
    if (el) el.classList.toggle('active', v === view && !acctId);
  });

  // Deactivate client items
  document.querySelectorAll('.sb-client-item').forEach(function(el) {
    el.classList.remove('active');
  });
  if (acctId) {
    var ci = document.getElementById('sbc-' + acctId);
    if (ci) ci.classList.add('active');
  }

  // Topbar
  var title = {
    dashboard: 'Dashboard',
    pitches: 'Pitches',
    ops: 'Internal Ops',
    activity: 'Activity Log',
    chat: 'Chat',
    people: 'People',
    leaderboard: 'Leaderboard'
  }[view] || '';

  if (acctId) {
    var acct = getAccount(acctId);
    title = acct ? (acct.emoji + ' ' + acct.name) : 'Account';
  }

  document.getElementById('topbar-title').textContent = title;

  // Render
  var vc = document.getElementById('view-container');
  vc.innerHTML = '';

  if (view === 'dashboard') renderDashboard();
  else if (view === 'pitches') renderPitches();
  else if (view === 'ops') renderOps();
  else if (view === 'activity') renderActivity();
  else if (view === 'chat') renderChat();
  else if (view === 'people') renderPeople();
  else if (view === 'leaderboard') renderLeaderboard();
  else if (acctId) renderAcct(acctId);

  renderTopbarActions();
}

function renderSidebar() {
  // User display
  var u = STATE.currentUser;
  if (u) {
    document.getElementById('sb-user-display').innerHTML =

      '<div><div class="sb-user-name">' + u.name + '</div><div class="sb-user-role">' + u.role + '</div></div>';

  // Client list
  var html = '';
  STATE.accounts.forEach(function(a) {

      '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + a.name + '</span>' +

  updateChatBadge();

function renderTopbarActions() {
  var el = document.getElementById('topbar-actions');
  var html = '';
  if (STATE.currentView === 'dashboard') {
    html = '<button class="btn-xs" onclick="exportAllExcel()">⬇ Export All</button>';
  } else if (STATE.currentAcct) {
    var acct = getAccount(STATE.currentAcct);
    if (isAdmin() && acct) {
      html += '<button class="btn-xs" onclick="openEditAcctModal(\'' + acct.id + '\')" style="margin-right:6px">Edit</button>';
    }
    html += '<button class="btn-xs" onclick="exportAcctExcel(\'' + STATE.currentAcct + '\')">⬇ Export</button>';
  } else if (STATE.currentView === 'pitches') {
    if (isLead()) html = '<button class="btn" onclick="openAddPitchModal()">+ New Pitch</button>';
  } else if (STATE.currentView === 'ops') {
    if (isLead()) html = '<button class="btn" onclick="openAddOpsModal()">+ New Task</button>';
  } else if (STATE.currentView === 'people') {
    if (isAdmin()) html = '<button class="btn" onclick="openAddPersonModal()">+ Add Person</button>';
  } else if (STATE.currentView === 'activity') {
    html = '';
  }
  el.innerHTML = html;
}

function renderDashboard() {
  var vc = document.getElementById('view-container');
  vc.style.cssText = 'flex:1;overflow:hidden;display:flex;flex-direction:column';
  var u = STATE.currentUser;
  if (!u) return;

  var myTasks = STATE.tasks.filter(function(t){return t.assignee === u.id && t.stage < 4;});
  var overdue = STATE.tasks.filter(function(t){return t.assignee === u.id && isOverdue(t.dueDate) && t.stage < 4;});
  var inReview = STATE.tasks.filter(function(t){return t.stage === 3;});
  var activePitches = STATE.pitches.filter(function(p){return p.stage < 3;});

  var html = '<div style="padding:16px 18px;overflow-y:auto;flex:1">';
  // Stat cards
  html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">';
  html += statCard('⚡','My Open Tasks', myTasks.length, '');
  html += statCard('🔴','Overdue', overdue.length, overdue.length > 0 ? 'color:#C94040' : '');
  html += statCard('👀','In Review', inReview.length, '');
  html += statCard('🎯','Active Pitches', activePitches.length, '');
  html += '</div>';

  // 3-col layout
  html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:start">';

  // Col 1: My tasks + overdue
  html += '<div>';
  html += '<div class="dash-section-title">My Tasks</div>';
  if (myTasks.length === 0) html += '<div style="color:#A8A69E;font-size:12px;padding:8px 0">No open tasks</div>';
  myTasks.slice(0,6).forEach(function(t) {
    var acct = getAccount(t.acctId);
    html += '<div class="dash-task-item" onclick="openTask(\'' + t.id + '\')">' +
      (isOverdue(t.dueDate) ? '<div class="dot-red"></div>' : '<div class="dot-green"></div>') +
      '<div class="dash-task-name">' + t.title + '</div>' +
      '<div style="font-size:10px;color:#A8A69E">' + (acct ? acct.emoji : '') + '</div>' +
      priBadge(t.priority) + '</div>';
  });

  html += '<div class="dash-section-title" style="margin-top:14px">Overdue</div>';
  if (overdue.length === 0) html += '<div style="color:#A8A69E;font-size:12px;padding:8px 0">All clear ✓</div>';
  overdue.slice(0,4).forEach(function(t) {
    html += '<div class="dash-task-item" onclick="openTask(\'' + t.id + '\')" style="border-color:rgba(201,64,64,0.2)">' +
      '<div class="dot-red"></div>' +
      '<div class="dash-task-name">' + t.title + '</div>' +
      '<div style="font-size:10px;color:#C94040;font-weight:600">' + formatDate(t.dueDate) + '</div>' +
      '</div>';
  });
  html += '</div>';

  // Col 2: In review + hot pitches
  html += '<div>';
  html += '<div class="dash-section-title">In Review</div>';
  if (inReview.length === 0) html += '<div style="color:#A8A69E;font-size:12px;padding:8px 0">Queue is empty</div>';
  inReview.slice(0,5).forEach(function(t) {
    var acct = getAccount(t.acctId);
    html += '<div class="dash-task-item" onclick="openTask(\'' + t.id + '\')">' +
      avatarHtml(t.assignee, 'sm') +
      '<div class="dash-task-name">' + t.title + '</div>' +
      '<div style="font-size:10px;color:#A8A69E">' + (acct ? acct.name : '') + '</div>' +
      '</div>';
  });

  html += '<div class="dash-section-title" style="margin-top:14px">Hot Pitches</div>';
  if (activePitches.length === 0) html += '<div style="color:#A8A69E;font-size:12px;padding:8px 0">No active pitches</div>';
  activePitches.slice(0,4).forEach(function(p) {

      '<span class="stage-badge stage-' + p.stage + '">' + stages[p.stage] + '</span>' +

  });
  html += '</div>';

  // Col 3: Recent activity
  html += '<div>';
  html += '<div class="dash-section-title">Recent Activity</div>';
  if (STATE.activityLog.length === 0) html += '<div style="color:#A8A69E;font-size:12px;padding:8px 0">No activity yet</div>';
  STATE.activityLog.slice(0,5).forEach(function(entry) {

function statCard(icon, label, num, style) {
  return '<div class="stat-card"><div class="stat-icon">' + icon + '</div><div class="stat-num" style="' + style + '">' + num + '</div><div class="stat-label">' + label + '</div></div>';
}

function openTask(taskId, acctId) {
  var task = STATE.tasks.find(function(t){return t.id === taskId;});
  if (!task) return;
  if (!acctId) acctId = task.acctId;
  EDIT_TASK_ID = taskId;
  var acct = getAccount(acctId);
  document.getElementById('tp-acct-label').textContent = acct ? (acct.emoji + ' ' + acct.name) : '';

function closeTaskPanel() {
  document.getElementById('task-panel').classList.remove('open');
  EDIT_TASK_ID = null;
}

  leftHtml += '<div class="tp-field-row">';
  leftHtml += '<div class="tp-field"><label>Status</label>' +
    '<select id="tp-stage" ' + (canEdit?'':'disabled') + ' onchange="saveTaskField(\'stage\',true)">' +
    stages.map(function(s,i){return '<option value="'+i+'"'+(task.stage===i?' selected':'')+'>'+s+'</option>';}).join('') +
    '</select></div>';
  leftHtml += '<div class="tp-field"><label>Priority</label>' +
    '<select id="tp-priority" ' + (canEdit?'':'disabled') + ' onchange="saveTaskField(\'priority\')">' +
    ['low','medium','high','urgent'].map(function(p){return '<option value="'+p+'"'+(task.priority===p?' selected':'')+'>'+p.charAt(0).toUpperCase()+p.slice(1)+'</option>';}).join('') +
    '</select></div>';
  leftHtml += '<div class="tp-field"><label>Assignee</label><select id="tp-assignee" ' + (canEdit&&isLead()?'':'disabled') + ' onchange="saveTaskField(\'assignee\')">' +
    STATE.people.map(function(p){return '<option value="'+p.id+'"'+(task.assignee===p.id?' selected':'')+'>'+p.name+'</option>';}).join('') +
    '</select></div>';
  leftHtml += '</div>';

  leftHtml += '<div class="tp-field-row">';
  leftHtml += '<div class="tp-field"><label>Start Date</label><input type="date" id="tp-start" value="'+(task.startDate||'')+'" ' + (canEdit?'':'disabled') + ' onchange="saveTaskField(\'startDate\')"></div>';
  leftHtml += '<div class="tp-field"><label>Due Date</label><input type="date" id="tp-due" value="'+(task.dueDate||'')+'" ' + (canEdit?'':'disabled') + ' onchange="saveTaskField(\'dueDate\')" style="'+(isOverdue(task.dueDate)?'color:#C94040;font-weight:600':'')+'"></div>';
  leftHtml += '</div>';

  leftHtml += '<div class="panel-section-head">Description</div>';
  leftHtml += '<textarea class="tp-desc" id="tp-desc" ' + (canEdit?'':'readonly') + ' placeholder="Add a description..." onblur="saveTaskField(\'description\')">' + (task.description || '') + '</textarea>';

  leftHtml += '<div class="panel-section-head">Subtasks' +

  leftHtml += '<div id="tp-subtasks">' + renderSubtasks(task, canEdit) + '</div>';

  // Attachments
  leftHtml += '<div class="panel-section-head">Attachments' +
    (canEdit ? '<div style="display:flex;gap:5px"><button class="btn-xs" onclick="document.getElementById(\'tp-file-input\').click()">⬆ File</button><button class="btn-xs" onclick="addLinkAttachment()">🔗 Link</button></div>' : '') + '</div>';
  leftHtml += '<input type="file" id="tp-file-input" style="display:none" onchange="uploadFile(this)">';
  leftHtml += '<div id="tp-attachments">' + renderAttachments(task) + '</div>';

  document.getElementById('tp-left').innerHTML = leftHtml;

  // Right panel — activity + comments
  var rightHtml = '<div style="font-size:11px;font-weight:600;color:#6A6860;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">Activity</div>';
  var acts = task.activity || [];
  if (acts.length === 0) rightHtml += '<div style="color:#A8A69E;font-size:11px">No activity yet</div>';
  acts.slice().reverse().forEach(function(a) {
    rightHtml += '<div class="act-item"><div class="av av-sm ' + getPerson(a.user||'').color + '">' + getPerson(a.user||'').initials + '</div>' +
      '<div><div class="act-text">' + a.text + '</div><div class="act-time">' + timeAgo(a.time) + '</div></div></div>';
  });

  rightHtml += '<div style="font-size:11px;font-weight:600;color:#6A6860;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Comments</div>';
  var cmts = task.comments || [];
  cmts.forEach(function(c) {
    rightHtml += '<div class="act-item">' + avatarHtml(c.user, 'sm') +
      '<div><div class="act-text">' + c.text + '</div><div class="act-time">' + getPerson(c.user).name + ' · ' + timeAgo(c.time) + '</div></div></div>';
  });

  rightHtml += '<div class="comment-input-wrap">' +
    avatarHtml(STATE.currentUser ? STATE.currentUser.id : '', 'sm') +
    '<textarea class="comment-input" id="tp-comment-input" placeholder="Write a comment..." onkeydown="commentKeydown(event)"></textarea></div>' +
    '<button class="btn-xs" style="margin-top:5px;width:100%" onclick="submitComment()">Send</button>';

function renderSubtasks(task, canEdit) {
  var subtasks = task.subtasks || [];
  var doneCount = subtasks.filter(function(s){return s.done;}).length;
  var total = subtasks.length;
  var pct = total > 0 ? Math.round((doneCount/total)*100) : 0;

  if (total === 0) {
    return '<div style="color:#A8A69E;font-size:11px;padding:5px 0 2px">No subtasks added</div>';
  }

  // Progress bar
  var html = '<div style="margin-bottom:8px">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">';
  html += '<span style="font-size:10px;color:#A8A69E">' + doneCount + ' of ' + total + ' complete</span>';
  html += '<span style="font-size:10px;font-weight:600;color:' + (pct===100?'#1D9E75':'#6A6860') + '">' + pct + '%</span>';
  html += '</div>';
  html += '<div style="height:3px;background:#EFEDE7;border-radius:2px;overflow:hidden">';
  html += '<div style="height:100%;width:' + pct + '%;background:#1D9E75;border-radius:2px;transition:width 0.3s"></div>';
  html += '</div></div>';

  // Items
  subtasks.forEach(function(s, i) {
    var rowBg = s.done ? 'background:#F9F9F7;' : 'background:#fff;';
    html += '<div style="display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:6px;margin-bottom:4px;border:1px solid rgba(0,0,0,' + (s.done?'0.05':'0.08') + ');' + rowBg + 'transition:background 0.1s">';
    html += '<input type="checkbox" ' + (s.done?'checked':'') + (canEdit?' onclick="toggleSubtask('+i+')"':' disabled') + ' style="width:15px;height:15px;flex-shrink:0;cursor:' + (canEdit?'pointer':'default') + ';accent-color:#1D9E75">';
    html += '<span style="flex:1;font-size:12px;' + (s.done?'text-decoration:line-through;color:#A8A69E;':'color:#18170F;') + '">' + s.text + '</span>';
    if (canEdit) {
      html += '<button onclick="deleteSubtask('+i+')" class="del-btn" style="background:none;border:none;cursor:pointer;font-size:13px;color:#D0CEC8;padding:2px 4px;border-radius:3px;flex-shrink:0">✕</button>';
    }
    html += '</div>';
  });

  return html;
}

function renderAttachments(task) {
  if (!task.attachments || task.attachments.length === 0) return '<div style="color:#A8A69E;font-size:11px;padding:4px 0">No attachments</div>';
  var html = '';
  task.attachments.forEach(function(a, i) {
    var typeLabel = a.type || 'File';
    html += '<div class="attach-item">' +
      '<span class="attach-type">' + typeLabel + '</span>' +
      '<a class="attach-link" href="' + a.url + '" target="_blank">' + (a.name || a.url) + '</a>' +
      '</div>';
  });
  return html;
}

function saveTaskField(field, checkApproved) {
  var task = STATE.tasks.find(function(t){return t.id === EDIT_TASK_ID;});
  if (!task) return;
  if (!canEditTask(task)) return;

  var oldStage = task.stage;
  if (field === 'title') {
    task.title = document.getElementById('tp-title').value;
  } else if (field === 'stage') {
    var ns = parseInt(document.getElementById('tp-stage').value);
    if (ns !== task.stage) {
      var acct = getAccount(task.acctId);
      var stages = acct ? acct.stages : ['Backlog','Planning','In Progress','Ready for Review','Approved','Rejected'];
      task.activity = task.activity || [];
      task.activity.push({type:'stage',user:STATE.currentUser.id,text:'Moved to ' + stages[ns],time:new Date().toISOString()});
      logActivity('Task', '"' + task.title + '" moved to ' + stages[ns]);
      // Leaderboard
      if (ns === 4) {
        awardApproved(task);
      }
    }
    task.stage = ns;
  } else if (field === 'priority') {
    task.priority = document.getElementById('tp-priority').value;
  } else if (field === 'assignee') {
    task.assignee = document.getElementById('tp-assignee').value;
    task.activity = task.activity || [];
    task.activity.push({type:'assign',user:STATE.currentUser.id,text:'Assigned to ' + getPerson(task.assignee).name,time:new Date().toISOString()});
  } else if (field === 'startDate') {
    task.startDate = document.getElementById('tp-start').value;
  } else if (field === 'dueDate') {
    task.dueDate = document.getElementById('tp-due').value;
  } else if (field === 'description') {
    task.description = document.getElementById('tp-desc').value;
  }

  saveToStorage();

  if (STATE.currentAcct) renderAcct(STATE.currentAcct);
  else if (STATE.currentView === 'dashboard') renderDashboard();

  // Re-render task panel so activity/right side stays fresh
  if (EDIT_TASK_ID) {
    var refreshTask = STATE.tasks.find(function(t){return t.id === EDIT_TASK_ID;});
    if (refreshTask) {
      var refreshAcct = getAccount(refreshTask.acctId);
      renderTaskPanel(refreshTask, canEditTask(refreshTask), refreshAcct);
    }
  }
}

function awardApproved(task) {
  // Prevent double-award: check if this task ID already awarded
  var alreadyAwarded = STATE.leaderboard.some(function(l){
    return (l.awardedTaskIds||[]).indexOf(task.id) >= 0;
  });
  if (alreadyAwarded) return;

  var assignee = task.assignee;
  var existing = STATE.leaderboard.find(function(l){return l.id === assignee;});
  if (existing) {
    existing.count++;
    existing.tasks = existing.tasks || [];
    existing.tasks.unshift({title:task.title, time:new Date().toISOString()});
    existing.awardedTaskIds = existing.awardedTaskIds || [];
    existing.awardedTaskIds.push(task.id);
  } else {
    STATE.leaderboard.push({id:assignee, count:1, tasks:[{title:task.title, time:new Date().toISOString()}], awardedTaskIds:[task.id]});
  }
  STATE.leaderboard.sort(function(a,b){return b.count - a.count;});
}

function addSubtask() {
  var text = prompt('Subtask description:');
  if (!text || !text.trim()) return;
  var task = STATE.tasks.find(function(t){return t.id === EDIT_TASK_ID;});
  if (!task) return;
  task.subtasks = task.subtasks || [];
  task.subtasks.push({text:text.trim(), done:false});
  task.activity = task.activity || [];
  task.activity.push({type:'subtask',user:STATE.currentUser.id,text:'Added subtask: '+text.trim(),time:new Date().toISOString()});
  saveToStorage();
  document.getElementById('tp-subtasks').innerHTML = renderSubtasks(task, true);
}

function toggleSubtask(i) {
  var task = STATE.tasks.find(function(t){return t.id === EDIT_TASK_ID;});
  if (!task || !task.subtasks) return;
  task.subtasks[i].done = !task.subtasks[i].done;
  saveToStorage();
  document.getElementById('tp-subtasks').innerHTML = renderSubtasks(task, true);
}

function deleteSubtask(i) {
  var task = STATE.tasks.find(function(t){return t.id === EDIT_TASK_ID;});
  if (!task || !task.subtasks) return;
  task.subtasks.splice(i, 1);
  saveToStorage();
  document.getElementById('tp-subtasks').innerHTML = renderSubtasks(task, true);
}

function uploadFile(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  if (file.size > 10 * 1024 * 1024) { alert('File too large (max 10MB)'); return; }
  var fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', 'wireflow_uploads');
  fetch('https://api.cloudinary.com/v1_1/dnhktlm2m/auto/upload', {method:'POST',body:fd})
    .then(function(r){return r.json();})
    .then(function(data) {
      var task = STATE.tasks.find(function(t){return t.id === EDIT_TASK_ID;});
      if (!task) return;
      task.attachments = task.attachments || [];
      task.attachments.push({name:file.name, url:data.secure_url, type:'File'});
      task.activity = task.activity || [];
      task.activity.push({type:'attachment',user:STATE.currentUser.id,text:'Attached file: '+file.name,time:new Date().toISOString()});
      saveToStorage();
      document.getElementById('tp-attachments').innerHTML = renderAttachments(task);
    }).catch(function(){alert('Upload failed');});
}

function addLinkAttachment() {
  var url = prompt('Paste link (Drive / Figma / Notion / other):');
  if (!url || !url.trim()) return;
  var task = STATE.tasks.find(function(t){return t.id === EDIT_TASK_ID;});
  if (!task) return;
  var type = 'Link';
  if (url.indexOf('figma') >= 0) type = 'Figma';
  else if (url.indexOf('notion') >= 0) type = 'Notion';
  else if (url.indexOf('drive.google') >= 0 || url.indexOf('docs.google') >= 0) type = 'Drive';
  var name = prompt('Name for this link:', url.slice(0, 40));
  task.attachments = task.attachments || [];
  task.attachments.push({name:name||url, url:url, type:type});
  task.activity = task.activity || [];
  task.activity.push({type:'attachment',user:STATE.currentUser.id,text:'Added link: '+(name||url),time:new Date().toISOString()});
  saveToStorage();
  document.getElementById('tp-attachments').innerHTML = renderAttachments(task);
}

function submitComment() {
  var input = document.getElementById('tp-comment-input');
  if (!input || !input.value.trim()) return;
  var task = STATE.tasks.find(function(t){return t.id === EDIT_TASK_ID;});
  if (!task) return;
  task.comments = task.comments || [];
  task.comments.push({text:input.value.trim(), user:STATE.currentUser.id, time:new Date().toISOString()});
  task.activity = task.activity || [];
  task.activity.push({type:'comment',user:STATE.currentUser.id,text:'Commented: '+input.value.trim().slice(0,40),time:new Date().toISOString()});
  input.value = '';
  saveToStorage();
  var acct = getAccount(task.acctId);
  renderTaskPanel(task, canEditTask(task), acct);
}

function commentKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitComment(); }
}

function deleteCurrentTask() {
  if (!EDIT_TASK_ID) return;
  if (!confirm('Delete this task?')) return;
  STATE.tasks = STATE.tasks.filter(function(t){return t.id !== EDIT_TASK_ID;});
  saveToStorage();
  closeTaskPanel();
  if (STATE.currentAcct) renderAcct(STATE.currentAcct);
  else renderDashboard();
}

function showAcctBoard(acctId) {
  var acct = getAccount(acctId);
  if (!acct) return;
  var body = document.getElementById('acct-body');
  if (!body) return;

  var tasks = STATE.tasks.filter(function(t){return t.acctId === acctId;});
  var stages = acct.stages;

  // CRITICAL: fully inlined styles, NO template literals, plain string concat
  var panelOpen = document.getElementById('task-panel') && document.getElementById('task-panel').classList.contains('open');
  var boardPad = panelOpen ? 'padding:14px;padding-right:694px' : 'padding:14px';
  var html = '<div style="width:100%;height:100%;overflow-x:auto;overflow-y:hidden;display:flex;gap:11px;' + boardPad + '">';

  for (var si = 0; si < stages.length; si++) {
    var stageName = stages[si];
    var stageTasks = tasks.filter(function(t){return t.stage === si;});
    var colBg = si === 4 ? 'background:#F0FAF6;' : si === 5 ? 'background:#FDF5F5;' : 'background:#F5F4F0;';

    html += '<div style="width:230px;min-width:230px;flex-shrink:0;display:flex;flex-direction:column;height:calc(100vh - 158px);' + colBg + 'border-radius:8px;border:1px solid rgba(0,0,0,0.07)">';
    html += '<div style="padding:8px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid rgba(0,0,0,0.07)">';
    html += '<span style="font-size:12px;font-weight:600;color:#6A6860">' + stageName + '</span>';
    html += '<span style="font-size:10px;color:#A8A69E;background:#fff;padding:1px 6px;border-radius:10px;border:1px solid rgba(0,0,0,0.07)">' + stageTasks.length + '</span>';
    html += '</div>';
    html += '<div style="flex:1;overflow-y:auto;padding:7px" id="col-cards-' + si + '">';

    for (var ti = 0; ti < stageTasks.length; ti++) {
      var t = stageTasks[ti];
      var cardBorder = isOverdue(t.dueDate) && t.stage < 4 ? 'border:1px solid rgba(201,64,64,0.25);' : 'border:1px solid rgba(0,0,0,0.08);';
      html += '<div onclick="openTask(\'' + t.id + '\',\'' + acctId + '\')" style="background:#fff;border-radius:8px;' + cardBorder + 'padding:10px;margin-bottom:7px;cursor:pointer;transition:box-shadow 0.12s" onmouseover="this.style.boxShadow=\'0 2px 8px rgba(0,0,0,0.08)\'" onmouseout="this.style.boxShadow=\'none\'">';
      html += '<div style="font-size:12px;font-weight:500;color:#18170F;margin-bottom:7px;line-height:1.4">' + t.title + '</div>';
      html += '<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">';

      var priCls = {urgent:'background:#FDDCDC;color:#C94040',high:'background:#FDE8C8;color:#D4840A',medium:'background:#D0E8F9;color:#2B7FD4',low:'background:#E8E5D8;color:#6A6860'}[t.priority] || '';
      html += '<span style="font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;' + priCls + '">' + (t.priority ? t.priority.charAt(0).toUpperCase() + t.priority.slice(1) : '') + '</span>';

      if (t.dueDate) {
        var dueCls = isOverdue(t.dueDate) && t.stage < 4 ? 'color:#C94040;font-weight:600' : 'color:#6A6860';
        html += '<span style="font-size:10px;' + dueCls + '">' + formatDate(t.dueDate) + '</span>';
      }

      html += '<div style="margin-left:auto">' + avatarHtml(t.assignee, 'sm') + '</div>';
      html += '</div></div>';
    }

    html += '</div>';

    // Add task button at bottom
    if (isLead()) {
      var stageIdx = si; // capture for closure — use data attribute approach
      html += '<div style="padding:4px 7px 7px;flex-shrink:0">';
      html += '<button onclick="openAddTaskModal(\'' + acctId + '\',' + si + ')" style="width:100%;padding:7px;text-align:left;font-size:12px;color:#A8A69E;background:transparent;border:1px dashed rgba(0,0,0,0.12);border-radius:6px;cursor:pointer;font-family:inherit;transition:all 0.12s" onmouseover="this.style.background=\'#fff\';this.style.color=\'#18170F\'" onmouseout="this.style.background=\'transparent\';this.style.color=\'#A8A69E\'">+ Add task</button>';
      html += '</div>';
    }
    html += '</div>';
  }

function showAcctOverview(acctId) {
  var acct = getAccount(acctId);
  if (!acct) return;
  var body = document.getElementById('acct-body');
  if (!body) return;

  var tasks = STATE.tasks.filter(function(t){return t.acctId === acctId;});
  var lead = getPerson(acct.lead);

  body.style.cssText = 'flex:1;overflow:hidden;display:flex;flex-direction:column';
  var html = '<div style="padding:18px 20px;overflow-y:auto;flex:1">';
  html += '<div style="display:grid;grid-template-columns:2fr 1fr;gap:16px">';

  // Task list
  html += '<div>';
  html += '<div style="font-size:11px;font-weight:600;color:#A8A69E;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px">Tasks</div>';
  if (tasks.length === 0) html += '<div style="color:#A8A69E;font-size:13px">No tasks yet</div>';
  var stages = acct.stages || ['Backlog','Planning','In Progress','Ready for Review','Approved','Rejected'];
  tasks.forEach(function(t) {
    html += '<div class="card" style="padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:10px;cursor:pointer" onclick="openTask(\'' + t.id + '\',\'' + acctId + '\')">';
    html += stageBadge(t.stage, stages);
    html += '<span style="flex:1;font-size:12px;font-weight:500">' + t.title + '</span>';
    html += avatarHtml(t.assignee, 'sm');
    html += priBadge(t.priority);
    html += (t.dueDate ? '<span style="font-size:10px;color:'+(isOverdue(t.dueDate)?'#C94040':'#6A6860')+'">' + formatDate(t.dueDate) + '</span>' : '');
    html += '</div>';
  });
  if (isLead()) {
    html += '<button class="btn" style="margin-top:8px" onclick="openAddTaskModal(\'' + acctId + '\',0)">+ Add Task</button>';
  }
  html += '</div>';

  // Right col
  html += '<div>';
  html += '<div class="card" style="padding:14px;margin-bottom:12px">';
  html += '<div style="font-size:11px;font-weight:600;color:#A8A69E;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">Account Info</div>';
  html += '<div style="font-size:12px;margin-bottom:6px;color:#6A6860">' + acct.mandate + '</div>';
  html += '<div style="display:flex;align-items:center;gap:6px;margin-top:10px">' + avatarHtml(acct.lead, 'sm') +
    '<span style="font-size:12px;font-weight:500">' + lead.name + '</span><span style="font-size:10px;color:#A8A69E">Lead</span></div>';
  html += '</div>';

  // Stage edit
  if (isLead() && (isAdmin() || acct.lead === (STATE.currentUser ? STATE.currentUser.id : ''))) {
    html += '<div class="card" style="padding:14px">';
    html += '<div style="font-size:11px;font-weight:600;color:#A8A69E;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">Stages</div>';
    stages.forEach(function(s, i) {
      html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">';
      html += '<span style="font-size:10px;color:#A8A69E;width:12px">' + (i+1) + '</span>';
      html += '<input style="flex:1;padding:4px 7px;border-radius:4px;border:1px solid rgba(0,0,0,0.1);font-size:12px;font-family:inherit" value="' + s + '" onblur="updateStageName(\'' + acctId + '\',' + i + ',this.value)">';
      html += '</div>';
    });
    html += '</div>';
  }

  html += '</div>';

  // Notes
  html += '</div>';
  html += '<div style="margin-top:14px">';
  html += '<div style="font-size:11px;font-weight:600;color:#A8A69E;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Notes</div>';
  html += '<textarea style="width:100%;padding:10px;border-radius:6px;border:1px solid rgba(0,0,0,0.1);font-size:13px;font-family:inherit;min-height:80px;resize:vertical" placeholder="Account notes..." onblur="saveAcctNotes(\'' + acctId + '\',this.value)">' + (acct.notes || '') + '</textarea>';
  html += '</div>';
  html += '</div>';
  body.innerHTML = html;
}

function updateStageName(acctId, idx, val) {
  var acct = getAccount(acctId);
  if (!acct) return;
  acct.stages[idx] = val;
  saveToStorage();
}

function saveAcctNotes(acctId, val) {
  var acct = getAccount(acctId);
  if (!acct) return;
  acct.notes = val;
  saveToStorage();
}

function createTask(acctId) {
  var title = document.getElementById('nt-title').value.trim();
  if (!title) { alert('Please enter a task title'); return; }
  var task = {
    id: genId(),
    acctId: acctId,

    stage: parseInt(document.getElementById('nt-stage').value),
    priority: document.getElementById('nt-priority').value,
    assignee: document.getElementById('nt-assignee').value,
    startDate: document.getElementById('nt-start').value,
    dueDate: document.getElementById('nt-due').value,
    description: document.getElementById('nt-desc').value,

    checklists: [],
    attachments: [],
    activity: [{type:'created',user:STATE.currentUser.id,text:'Task created by '+STATE.currentUser.name,time:new Date().toISOString()}],
    comments: [],

  };
  STATE.tasks.push(task);

function createAccount() {
  var name = (document.getElementById('na-name').value||'').trim();
  if (!name) { alert('Enter account name'); return; }
  var id = name.toLowerCase().replace(/[^a-z0-9]/g,'');
  if (getAccount(id)) id = id + genId().slice(-4);
  var acct = {
    id: id,
    name: name,
    emoji: document.getElementById('na-emoji').value || '🏢',
    mandate: document.getElementById('na-mandate').value,
    lead: document.getElementById('na-lead').value,
    color: document.getElementById('na-color').value,
    stages: ['Backlog','Planning','In Progress','Ready for Review','Approved','Rejected'],
    notes: ''
  };
  STATE.accounts.push(acct);
  logActivity('Task', 'Account "' + name + '" created');
  saveToStorage();
  closeModal();
  renderSidebar();
  navigate('acct', id);
}

function saveAccount(acctId) {
  var acct = getAccount(acctId);
  if (!acct) return;
  acct.name = document.getElementById('ea-name').value;
  acct.emoji = document.getElementById('ea-emoji').value;
  acct.mandate = document.getElementById('ea-mandate').value;
  acct.lead = document.getElementById('ea-lead').value;
  saveToStorage();
  closeModal();
  renderSidebar();
  if (STATE.currentAcct === acctId) navigate('acct', acctId);
}

function deleteAccount(acctId) {
  if (!confirm('Delete this account and all its tasks?')) return;
  STATE.accounts = STATE.accounts.filter(function(a){return a.id !== acctId;});
  STATE.tasks = STATE.tasks.filter(function(t){return t.acctId !== acctId;});
  saveToStorage();
  closeModal();
  renderSidebar();
  navigate('dashboard');
}

var PITCH_STAGES = ['Prospecting','Pitched','Follow-up','Won'];

function showPitchBoard() {
  var body = document.getElementById('pitch-body');
  if (!body) return;
  document.getElementById('ptab-board').style.cssText = 'padding:11px 16px;font-size:13px;font-weight:500;background:transparent;border:none;border-bottom:2px solid #18170F;color:#18170F;cursor:pointer;font-family:inherit';
  document.getElementById('ptab-docs').style.cssText = 'padding:11px 16px;font-size:13px;font-weight:500;background:transparent;border:none;border-bottom:2px solid transparent;color:#6A6860;cursor:pointer;font-family:inherit';

  var html = '<div style="width:100%;height:100%;overflow-x:auto;overflow-y:hidden;display:flex;gap:11px;padding:14px">';
  for (var si = 0; si < PITCH_STAGES.length; si++) {
    var stageName = PITCH_STAGES[si];
    var pitches = STATE.pitches.filter(function(p){return p.stage === si;});
    var colBg = si === 3 ? 'background:#F0FAF6;' : 'background:#F5F4F0;';

    html += '<div style="width:250px;min-width:250px;flex-shrink:0;display:flex;flex-direction:column;height:calc(100vh - 158px);' + colBg + 'border-radius:8px;border:1px solid rgba(0,0,0,0.07)">';
    html += '<div style="padding:8px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid rgba(0,0,0,0.07)">';
    html += '<span style="font-size:12px;font-weight:600;color:#6A6860">' + stageName + '</span>';
    html += '<span style="font-size:10px;color:#A8A69E;background:#fff;padding:1px 6px;border-radius:10px;border:1px solid rgba(0,0,0,0.07)">' + pitches.length + '</span>';
    html += '</div>';
    html += '<div style="flex:1;overflow-y:auto;padding:7px">';

    for (var pi = 0; pi < pitches.length; pi++) {
      var p = pitches[pi];
      html += '<div onclick="openPitch(\'' + p.id + '\')" style="background:#fff;border-radius:8px;border:1px solid rgba(0,0,0,0.08);padding:12px;margin-bottom:8px;cursor:pointer;transition:box-shadow 0.12s" onmouseover="this.style.boxShadow=\'0 2px 8px rgba(0,0,0,0.08)\'" onmouseout="this.style.boxShadow=\'none\'">';
      html += '<div style="font-size:13px;font-weight:600;color:#18170F;margin-bottom:5px">' + p.company + '</div>';
      if (p.value) html += '<div style="font-size:11px;color:#1D9E75;font-weight:600;margin-bottom:5px">₹' + Math.round(p.value).toLocaleString('en-IN') + '/mo</div>';
      html += '<div style="display:flex;align-items:center;justify-content:space-between">';
      html += '<span style="font-size:10px;color:#A8A69E">' + (p.docs||[]).length + ' docs</span>';
      html += avatarHtml(p.owner, 'sm');
      html += '</div></div>';
    }
    html += '</div>';
    if (isLead()) {
      html += '<div style="padding:4px 7px 7px;flex-shrink:0"><button onclick="openAddPitchModal(' + si + ')" style="width:100%;padding:7px;text-align:left;font-size:12px;color:#A8A69E;background:transparent;border:1px dashed rgba(0,0,0,0.12);border-radius:6px;cursor:pointer;font-family:inherit" onmouseover="this.style.background=\'#fff\'" onmouseout="this.style.background=\'transparent\'">+ Add pitch</button></div>';
    }
    html += '</div>';
  }
  html += '</div>';
  body.innerHTML = html;
}

function showAllDocs() {
  var body = document.getElementById('pitch-body');
  document.getElementById('ptab-board').style.cssText = 'padding:11px 16px;font-size:13px;font-weight:500;background:transparent;border:none;border-bottom:2px solid transparent;color:#6A6860;cursor:pointer;font-family:inherit';
  document.getElementById('ptab-docs').style.cssText = 'padding:11px 16px;font-size:13px;font-weight:500;background:transparent;border:none;border-bottom:2px solid #18170F;color:#18170F;cursor:pointer;font-family:inherit';

  var html = '<div style="padding:14px 18px;overflow-y:auto;height:100%">';

  STATE.pitches.forEach(function(p) {

  body.innerHTML = html;

function openPitch(pitchId) {
  var pitch = STATE.pitches.find(function(p){return p.id === pitchId;});
  if (!pitch) return;
  EDIT_PITCH_ID = pitchId;
  var panel = document.getElementById('pitch-panel');
  if (!panel) {
    var el = document.createElement('div');
    el.id = 'pitch-panel';
    el.setAttribute('style','position:absolute;right:0;top:0;bottom:0;width:480px;background:#fff;border-left:1px solid rgba(0,0,0,0.08);z-index:50;display:flex;flex-direction:column;transform:translateX(0);overflow-y:auto');
    document.getElementById('content').appendChild(el);
    panel = el;
  }
  panel.innerHTML = renderPitchPanelHtml(pitch);
  panel.style.transform = 'translateX(0)';
}

  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
  html += '<div class="form-group"><label class="form-label">Value/mo (₹)</label><input type="number" class="form-input" value="'+(pitch.value||'')+'" onblur="savePitchField(\''+pitch.id+'\',\'value\',this.value)"></div>';
  html += '<div class="form-group"><label class="form-label">Owner</label><select class="form-select" onchange="savePitchField(\''+pitch.id+'\',\'owner\',this.value)">';
  STATE.people.forEach(function(p){html += '<option value="'+p.id+'"'+(pitch.owner===p.id?' selected':'')+'>'+p.name+'</option>';});
  html += '</select></div>';
  html += '</div>';
  html += '<div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" onblur="savePitchField(\''+pitch.id+'\',\'notes\',this.value)">'+(pitch.notes||'')+'</textarea></div>';

  // Docs
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;margin-top:4px">';
  html += '<div style="font-size:11px;font-weight:600;color:#A8A69E;text-transform:uppercase;letter-spacing:0.5px">Docs</div>';
  html += '<div style="display:flex;gap:5px">';
  if (isLead()) html += '<button class="btn-xs" onclick="addPitchDoc(\''+pitch.id+'\')">+ Add Doc</button>';
  html += '</div>';
  html += '</div>';
  if ((pitch.docs||[]).length === 0) {
    html += '<div style="color:#A8A69E;font-size:12px;padding:6px 0">No docs attached yet</div>';
  }
  (pitch.docs||[]).forEach(function(d,i) {
    html += '<div class="attach-item">';
    html += '<span class="attach-type">' + (d.type||'Doc') + '</span>';
    html += '<a class="attach-link" href="'+d.url+'" target="_blank">' + d.name + '</a>';
    if (isLead()) html += '<button class="del-btn" style="font-size:11px;cursor:pointer;background:none;border:none;color:#D0CEC8;padding:2px 4px;border-radius:3px" onclick="deletePitchDoc(\''+pitch.id+'\','+i+')">✕</button>';
    html += '</div>';
  });

  // Delete pitch
  if (isAdmin()) {
    html += '<div style="margin-top:18px;padding-top:14px;border-top:1px solid rgba(0,0,0,0.07)">';
    html += '<button class="btn-xs btn-danger" onclick="deletePitch(\''+pitch.id+'\')">Delete Pitch</button>';
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function savePitchField(pitchId, field, val) {
  var pitch = STATE.pitches.find(function(p){return p.id === pitchId;});
  if (!pitch || !isLead()) return;
  var old = pitch[field];
  pitch[field] = field === 'stage' || field === 'value' ? parseFloat(val) : val;
  if (field === 'stage' && parseFloat(val) === 3 && old !== 3) {
    logActivity('Pitch', '"' + pitch.company + '" marked as Won!');
  }
  saveToStorage();
  if (STATE.currentView === 'pitches') showPitchBoard();
}

function addPitchDoc(pitchId) {
  var pitch = STATE.pitches.find(function(p){return p.id === pitchId;});
  if (!pitch) return;
  var name = prompt('Document name:');
  if (!name) return;
  var url = prompt('URL:');
  if (!url) return;
  var type = prompt('Type (Brief/Deck/Report/Proposal/Other):', 'Brief');
  pitch.docs = pitch.docs || [];
  pitch.docs.push({name:name, url:url, type:type||'Brief'});
  logActivity('Doc', 'Doc "'+name+'" added to '+pitch.company);
  saveToStorage();
  openPitch(pitchId);
}

function deletePitchDoc(pitchId, idx) {
  var pitch = STATE.pitches.find(function(p){return p.id === pitchId;});
  if (!pitch) return;
  pitch.docs.splice(idx, 1);
  saveToStorage();
  openPitch(pitchId);
}

function deletePitch(pitchId) {
  if (!confirm('Delete this pitch?')) return;
  STATE.pitches = STATE.pitches.filter(function(p){return p.id !== pitchId;});
  saveToStorage();
  closePitchPanel();
  renderPitches();
}

function closePitchPanel() {
  var panel = document.getElementById('pitch-panel');
  if (panel) panel.parentNode.removeChild(panel);
  EDIT_PITCH_ID = null;
}

// ============================================================
// INTERNAL OPS
// ============================================================
function renderOps() {
  var vc = document.getElementById('view-container');
  vc.style.cssText = 'flex:1;overflow:hidden;display:flex;flex-direction:column';

  var OPS_STAGE_STYLES = {
    'Backlog':  'background:#F5F4F0;color:#6A6860',
    'Planning': 'background:#D0E8F9;color:#1A5A9A',
    'In Progress': 'background:#FDE8C8;color:#8B5200',
    'Done':     'background:#D1F0E5;color:#0D6B4E'
  };

  var active = STATE.opsTasks.filter(function(t){return t.stage !== 'Done';});
  var done   = STATE.opsTasks.filter(function(t){return t.stage === 'Done';});

  function opsRowHtml(t) {
    var p = getPerson(t.assignee);
    var canEdit = isLead();
    var isDone = t.stage === 'Done';
    var stageStyle = OPS_STAGE_STYLES[t.stage] || 'background:#EFEDE7;color:#6A6860';
    var rowStyle = isDone ? 'opacity:0.65;' : '';
    var nameStyle = isDone ? 'text-decoration:line-through;color:#A8A69E' : '';
    var overdue = !isDone && t.deadline && isOverdue(t.deadline);

    var h = '<div class="ops-row" style="' + rowStyle + '">';
    // Name + done toggle
    h += '<div class="ops-name" style="display:flex;align-items:center;gap:8px">';
    if (canEdit) {
      h += '<input type="checkbox" ' + (isDone?'checked':'') + ' onchange="toggleOpsDone(\'' + t.id + '\')" style="cursor:pointer;accent-color:#1D9E75;width:14px;height:14px;flex-shrink:0">';
    }
    h += '<span style="' + nameStyle + '">' + t.name + '</span>';
    h += '</div>';
    // Assignee
    h += '<div class="ops-assignee">' + avatarHtml(t.assignee, 'sm') + '<span style="font-size:11px">' + p.name.split(' ')[0] + '</span></div>';
    // Stage dropdown
    h += '<div class="ops-stage">';
    if (canEdit) {
      h += '<select onchange="updateOpsStage(\'' + t.id + '\',this.value)" style="font-size:11px;padding:2px 6px;border-radius:5px;border:1px solid rgba(0,0,0,0.1);font-family:inherit;cursor:pointer;' + stageStyle + '">';
      ['Backlog','Planning','In Progress','Done'].forEach(function(s) {
        h += '<option value="' + s + '"' + (t.stage===s?' selected':'') + '>' + s + '</option>';
      });
      h += '</select>';
    } else {
      h += '<span style="font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;' + stageStyle + '">' + t.stage + '</span>';
    }
    h += '</div>';
    // Dates
    h += '<div class="ops-dates" style="' + (overdue?'color:#C94040;font-weight:600':'') + '">';
    h += (t.startDate ? formatDate(t.startDate) : '') + (t.deadline ? ' → ' + formatDate(t.deadline) : '');
    if (overdue) h += ' ⚠';
    h += '</div>';
    // Progress
    h += '<div class="ops-prog" style="display:flex;align-items:center;gap:7px">';
    h += '<div class="prog-bar" style="flex:1"><div class="prog-fill" style="width:' + (t.progress||0) + '%;background:' + (isDone?'#1D9E75':'#1D9E75') + '"></div></div>';
    h += '<span style="font-size:10px;color:#6A6860;width:28px">' + (t.progress||0) + '%</span>';
    if (canEdit && !isDone) h += '<input type="range" min="0" max="100" value="' + (t.progress||0) + '" style="width:55px" oninput="updateOpsProgress(\'' + t.id + '\',this.value)">';
    h += '</div>';
    // Delete
    if (canEdit) {
      h += '<div style="flex-shrink:0;margin-left:4px"><button onclick="deleteOpsTask(\'' + t.id + '\')" class="del-btn" style="background:none;border:none;cursor:pointer;font-size:13px;color:#D0CEC8;padding:2px 4px;border-radius:3px" title="Delete task">✕</button></div>';
    }
    h += '</div>';
    return h;
  }

  var html = '<div style="overflow-y:auto;flex:1">';
  // Header
  html += '<div style="display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(0,0,0,0.07);font-size:11px;font-weight:600;color:#A8A69E;text-transform:uppercase;letter-spacing:0.5px">';
  html += '<div style="flex:2">Task</div><div style="flex:1">Assignee</div><div style="flex:1">Stage</div>';
  html += '<div style="flex:1.5">Dates</div><div style="flex:1.5">Progress</div><div style="width:24px"></div></div>';

  // Active tasks
  if (active.length === 0 && done.length === 0) {
    html += '<div style="padding:30px;text-align:center;color:#A8A69E;font-size:13px">No ops tasks yet. Add one above.</div>';
  }
  active.forEach(function(t){ html += opsRowHtml(t); });

  // Done section — collapsible divider
  if (done.length > 0) {
    html += '<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;margin-top:4px;border-top:1px solid rgba(0,0,0,0.07);cursor:pointer" onclick="toggleOpsDoneSection()" id="ops-done-header">';
    html += '<span style="font-size:11px;font-weight:600;color:#A8A69E;text-transform:uppercase;letter-spacing:0.5px">Done</span>';
    html += '<span style="font-size:10px;background:#D1F0E5;color:#0D6B4E;padding:1px 6px;border-radius:10px;font-weight:600">' + done.length + '</span>';
    html += '<span style="font-size:11px;color:#A8A69E;margin-left:auto" id="ops-done-toggle">▾</span>';
    html += '</div>';
    html += '<div id="ops-done-section">';
    done.forEach(function(t){ html += opsRowHtml(t); });
    html += '</div>';
  }

  html += '</div>';
  vc.innerHTML = html;
}

function toggleOpsDoneSection() {
  var section = document.getElementById('ops-done-section');
  var toggle = document.getElementById('ops-done-toggle');
  if (!section) return;
  var hidden = section.style.display === 'none';
  section.style.display = hidden ? '' : 'none';
  if (toggle) toggle.textContent = hidden ? '▾' : '▸';
}

function toggleOpsDone(taskId) {
  var t = STATE.opsTasks.find(function(x){return x.id === taskId;});
  if (!t) return;
  t.stage = t.stage === 'Done' ? 'In Progress' : 'Done';
  if (t.stage === 'Done') t.progress = 100;
  saveToStorage();
  renderOps();
}

function updateOpsStage(taskId, val) {
  var t = STATE.opsTasks.find(function(x){return x.id === taskId;});
  if (!t) return;
  t.stage = val;
  if (val === 'Done') t.progress = 100;
  saveToStorage();
  renderOps();
}

function deleteOpsTask(taskId) {
  if (!confirm('Delete this ops task?')) return;
  STATE.opsTasks = STATE.opsTasks.filter(function(x){return x.id !== taskId;});
  saveToStorage();
  renderOps();
}

function openAddOpsModal() {
  var html = '<div class="modal">';
  html += '<div class="modal-title">New Ops Task</div>';
  html += '<div class="form-group"><label class="form-label">Task Name</label><input class="form-input" id="ot-name"></div>';
  html += '<div class="form-group"><label class="form-label">Assignee</label><select class="form-select" id="ot-assignee">' +
    STATE.people.map(function(p){return '<option value="'+p.id+'">'+p.name+'</option>';}).join('') + '</select></div>';
  html += '<div class="form-group"><label class="form-label">Stage</label><select class="form-select" id="ot-stage">' +
    ['Backlog','Planning','In Progress','Done'].map(function(s){return '<option value="'+s+'">'+s+'</option>';}).join('') + '</select></div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
  html += '<div class="form-group"><label class="form-label">Start Date</label><input type="date" class="form-input" id="ot-start"></div>';
  html += '<div class="form-group"><label class="form-label">Deadline</label><input type="date" class="form-input" id="ot-deadline"></div>';
  html += '</div>';
  html += '<div class="modal-footer"><button class="btn-xs btn-ghost" onclick="closeModal()">Cancel</button>';
  html += '<button class="btn" onclick="createOpsTask()">Add Task</button></div></div>';
  showModal(html);
}

function createOpsTask() {
  var name = (document.getElementById('ot-name').value||'').trim();
  if (!name) { alert('Enter task name'); return; }
  var t = {
    id: genId(),
    name: name,
    assignee: document.getElementById('ot-assignee').value,
    stage: document.getElementById('ot-stage').value,
    startDate: document.getElementById('ot-start').value,
    deadline: document.getElementById('ot-deadline').value,
    progress: 0
  };
  STATE.opsTasks.push(t);
  saveToStorage();
  closeModal();
  renderOps();
}

function updateOpsProgress(taskId, val) {
  var t = STATE.opsTasks.find(function(x){return x.id === taskId;});
  if (!t) return;
  t.progress = parseInt(val);
  saveToStorage();
  renderOps();
}
